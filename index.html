<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WPlace — Пиксель-Арт Сообщество</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');

        :root {
            --bg: #0a0a0a;
            --surface: #1a1a2e;
            --border: #00ff88;
            --text: #e0ffe0;
            --glow: #00ff88;
            --accent: #ff6b6b;
            --accent2: #ffd93d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            background-image:
                linear-gradient(0deg, rgba(0,255,136,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
            background-size: 8px 8px;
            color: var(--text);
            font-family: 'VT323', monospace;
            font-size: 20px;
            line-height: 1.5;
            min-height: 100vh;
            image-rendering: pixelated;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
            pointer-events: none; z-index: 9999;
        }

        .container { max-width: 900px; margin: 0 auto; padding: 20px; position: relative; z-index: 1; }

        header {
            text-align: center; padding: 30px 20px; margin-bottom: 20px;
            border: 4px solid var(--border); background: var(--surface);
            box-shadow: inset 0 0 30px rgba(0,255,136,0.1), 0 0 20px rgba(0,255,136,0.3), 0 0 60px rgba(0,255,136,0.1);
            position: relative; image-rendering: pixelated;
        }
        header::after { content: ""; position: absolute; bottom: -4px; left: -4px; width: calc(100% + 8px); height: 4px; background: var(--border); }

        .site-title { font-family: 'Press Start 2P', monospace; font-size: 28px; color: var(--glow); text-shadow: 0 0 10px var(--glow), 0 0 40px var(--glow), 0 0 80px var(--glow); letter-spacing: 3px; margin-bottom: 10px; }
        .site-subtitle { font-family: 'VT323', monospace; font-size: 24px; color: #88cc88; text-shadow: 0 0 8px rgba(136,204,136,0.6); }

        nav { display: flex; gap: 4px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }

        .tab-btn {
            font-family: 'Press Start 2P', monospace; font-size: 13px; padding: 14px 20px;
            background: var(--surface); color: var(--text); border: 4px solid #2a2a4a;
            cursor: pointer; transition: all 0.1s step-end; text-transform: uppercase;
            letter-spacing: 1px; box-shadow: 0 4px 0 #0a0a15; image-rendering: pixelated;
            flex: 1 1 auto; min-width: 120px; max-width: 200px;
        }
        .tab-btn:hover { border-color: var(--glow); color: var(--glow); text-shadow: 0 0 10px var(--glow); box-shadow: 0 4px 0 var(--glow); transform: translateY(-2px); }
        .tab-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--glow); }
        .tab-btn.active { background: #0d2a1a; border-color: var(--glow); color: var(--glow); text-shadow: 0 0 10px var(--glow); box-shadow: 0 0 15px var(--glow), 0 4px 0 var(--glow); }

        .tab-content { display: none; border: 4px solid #2a2a4a; background: var(--surface); padding: 30px; box-shadow: inset 0 0 40px rgba(0,0,0,0.5); image-rendering: pixelated; animation: fadeIn 0.2s step-end; }
        .tab-content.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .card { border: 3px solid #3a3a5a; background: #111128; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 0 #0a0a15; transition: all 0.1s step-end; }
        .card:hover { border-color: var(--accent2); box-shadow: 0 4px 0 var(--accent2), 0 0 20px rgba(255,217,61,0.2); }
        .card h3 { font-family: 'Press Start 2P', monospace; font-size: 14px; color: var(--accent2); margin-bottom: 15px; text-shadow: 0 0 8px rgba(255,217,61,0.4); }

        a { color: var(--glow); text-decoration: none; border-bottom: 2px dashed var(--glow); transition: all 0.1s step-end; font-weight: bold; }
        a:hover { border-bottom-style: solid; text-shadow: 0 0 10px var(--glow); }

        .link-pixel { display: inline-block; background: #0a1a10; border: 2px solid var(--glow); padding: 8px 16px; color: var(--glow); font-family: 'VT323', monospace; font-size: 18px; letter-spacing: 1px; word-break: break-all; margin: 5px 0; box-shadow: 0 3px 0 #0a5a2a; transition: all 0.1s step-end; }
        .link-pixel:hover { background: #0d2a1a; box-shadow: 0 3px 0 var(--glow); }

        .art-image-container {
            text-align: center;
            margin-bottom: 20px;
            border: 4px solid var(--border);
            padding: 12px;
            background: #0a0a15;
            box-shadow: 0 0 30px rgba(0,255,136,0.2);
        }
.art-image-container img {
    max-width: 100%;
    height: auto;
    image-rendering: pixelated;
    display: block;
    margin: 0 auto;
    position: relative;
    z-index: 10001;
}
        .art-info {
            text-align: center;
            font-size: 22px;
            color: var(--accent2);
            margin-top: 15px;
            text-shadow: 0 0 10px rgba(255,217,61,0.4);
        }

        ol.pixel-list { list-style: none; counter-reset: pixel-counter; padding-left: 0; }
        ol.pixel-list li { 
            counter-increment: pixel-counter; 
            padding: 14px 14px 14px 65px; 
            margin-bottom: 8px; 
            background: #0a0a1a; 
            border: 2px solid #2a2a4a; 
            position: relative; 
            transition: all 0.1s step-end; 
            word-break: break-word;
            min-height: 44px;
            display: flex;
            align-items: center;
        }
        ol.pixel-list li::before { 
            content: counter(pixel-counter); 
            position: absolute; 
            left: 10px; 
            top: 50%;
            transform: translateY(-50%);
            font-family: 'Press Start 2P', monospace; 
            font-size: 11px; 
            color: var(--accent2); 
            background: #1a1a30; 
            border: 2px solid #3a3a5a; 
            padding: 6px 8px; 
            min-width: 28px; 
            text-align: center;
            flex-shrink: 0;
        }
        ol.pixel-list li:hover { border-color: var(--glow); background: #0d0d20; }

        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
        .gallery-item { border: 3px solid #2a2a4a; background: #0a0a1a; padding: 8px; transition: all 0.1s step-end; text-align: center; cursor: pointer; }
        .gallery-item:hover { border-color: var(--accent); box-shadow: 0 0 20px rgba(255,107,107,0.3); transform: scale(1.03); }
        .gallery-item img { width: 100%; aspect-ratio: 1; object-fit: cover; border: 2px solid #3a3a5a; display: block; image-rendering: pixelated; }
        .gallery-item .label { font-family: 'VT323', monospace; font-size: 18px; margin-top: 8px; color: #ccc; }

        .modal-overlay {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 10000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            border: 4px solid var(--border);
            background: var(--surface);
            padding: 30px;
            max-width: 600px;
            width: 100%;
            text-align: center;
            box-shadow: 0 0 40px rgba(0,255,136,0.3);
            animation: fadeIn 0.2s step-end;
        }
        .modal img {
            max-width: 100%;
            max-height: 50vh;
            image-rendering: pixelated;
            border: 2px solid #3a3a5a;
            margin-bottom: 15px;
        }
        .modal h3 {
            font-family: 'Press Start 2P', monospace;
            font-size: 14px;
            color: var(--accent2);
            margin-bottom: 10px;
        }
        .modal .desc {
            font-size: 20px;
            color: #ccc;
            margin-bottom: 15px;
            line-height: 1.6;
        }
        .modal .close-btn {
            font-family: 'Press Start 2P', monospace;
            font-size: 12px;
            padding: 10px 20px;
            background: #0a2a0a;
            color: var(--glow);
            border: 3px solid var(--border);
            cursor: pointer;
        }

        .note { border: 3px dashed #3a3a5a; background: #0a0a15; padding: 15px; margin-top: 15px; font-style: italic; color: #88aacc; }

        footer { text-align: center; padding: 20px; margin-top: 30px; font-size: 16px; color: #3a3a5a; border-top: 2px solid #1a1a2e; }

        @media (max-width: 600px) {
            .site-title { font-size: 18px; }
            .tab-btn { font-size: 10px; padding: 10px 8px; }
            .tab-content { padding: 15px; }
            .gallery-grid { grid-template-columns: repeat(2, 1fr); }
            ol.pixel-list li { padding: 12px 10px 12px 55px; font-size: 16px; }
            ol.pixel-list li::before { font-size: 9px; min-width: 22px; padding: 4px 5px; left: 6px; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1 class="site-title">⚔ WPLACE ⚔</h1>
        <p class="site-subtitle">Пиксель-арт сообщество</p>
    </header>

    <nav>
        <button class="tab-btn active" onclick="openTab('home')">🏠 Главная</button>
        <button class="tab-btn" onclick="openTab('gallery')">🖼 Галерея</button>
        <button class="tab-btn" onclick="openTab('guides')">📚 Гайды</button>
    </nav>

    <div id="home" class="tab-content active">
        <div id="current-art-section"></div>
        <div id="help-section"></div>
    </div>

    <div id="gallery" class="tab-content">
        <h3 style="font-family: 'Press Start 2P', monospace; font-size: 16px; color: var(--accent); margin-bottom: 20px;">
            📜 История наших артов
        </h3>
        <div class="gallery-grid" id="gallery-grid"></div>
    </div>

    <div id="guides" class="tab-content">
        <h3 style="font-family: 'Press Start 2P', monospace; font-size: 16px; color: var(--accent2); margin-bottom: 20px;">
            🔧 Установка расширений
        </h3>
        <div id="guides-content"></div>
    </div>

    <footer>
        <p>WPlace Pixel Art Community © 2025 | Сделано с ❤️ на пикселях</p>
    </footer>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
    <div class="modal" id="modal-box">
        <img id="modal-img" src="" alt="">
        <h3 id="modal-title"></h3>
        <div class="desc" id="modal-desc"></div>
        <button class="close-btn" onclick="closeModal()">✕ ЗАКРЫТЬ</button>
    </div>
</div>

<script>
    async function loadJSON(path, fallback) {
        try {
            const res = await fetch(path);
            if (!res.ok) throw new Error('not found');
            return await res.json();
        } catch {
            return fallback;
        }
    }

    async function initContent() {
        const homeData = await loadJSON('/content/home.json', {
            title: "🎯 Актуальный арт",
            image: "",
            description: "Сейчас мы рисуем новый пиксель-арт на WPlace. Присоединяйся!",
            location: "https://wplace.live/?lat=53.38222746808291&lng=27.91098632812499&zoom=22",
            help_wplace: ["Открываете вкладку Overlays", "Нажимаете на кнопку \"Новый Overlay\"", "Вставляете фото на пикселе по ссылке ниже"],
            help_blue: ["Ставите точку на пикселе по ссылке ниже", "Нажимаете на кнопку \"Upload Template\" и выбираете файл с артом", "Нажимаете на кнопку \"Create\""],
            help_helper: ["Нажимаете на кнопку \"Галерея\"", "Находите арт и нажимаете на кнопку \"Загрузить\""]
        });

        document.getElementById('current-art-section').innerHTML = `
            <div class="card">
                <h3>${homeData.title}</h3>
                ${homeData.image ? `
                <div class="art-image-container">
                    <img src="${homeData.image}" alt="Актуальный арт">
                </div>` : ''}
                <div class="art-info">${homeData.description}</div>
                <p style="margin-top: 15px;">📍 <strong>Местоположение:</strong><br>
                <a href="${homeData.location}" class="link-pixel" target="_blank">🔗 ОТКРЫТЬ НА WPLACE</a></p>
            </div>`;

        document.getElementById('help-section').innerHTML = `
            <div class="card">
                <h3>🖌 Как помочь с этим артом</h3>
                <p style="color: var(--accent2); margin-bottom: 10px;">⚡ <strong>С помощью WPlace (сайт):</strong></p>
                <ol class="pixel-list">${homeData.help_wplace.map(s => `<li>${s}</li>`).join('')}</ol>
                <p style="color: var(--accent2); margin: 15px 0 10px;">🔷 <strong>С помощью Blue Marble:</strong></p>
                <ol class="pixel-list">${homeData.help_blue.map(s => `<li>${s}</li>`).join('')}</ol>
                <p style="color: var(--accent2); margin: 15px 0 10px;">🧩 <strong>С помощью WPlace Helper:</strong></p>
                <ol class="pixel-list">${homeData.help_helper.map(s => `<li>${s}</li>`).join('')}</ol>
            </div>`;

        const galleryData = await loadJSON('/content/gallery.json', []);
        document.getElementById('gallery-grid').innerHTML = galleryData.length > 0
            ? galleryData.map((item, i) => `
                <div class="gallery-item" onclick="openGalleryItem(${i})">
                    ${item.image ? `<img src="${item.image}" alt="${item.title}">` : '<div style="width:100%;aspect-ratio:1;background:repeating-linear-gradient(45deg,#1a1a30 0px,#1a1a30 8px,#111128 8px,#111128 16px);border:2px solid #3a3a5a;display:flex;align-items:center;justify-content:center;font-size:12px;color:#4a4a6a;">[АРТ]</div>'}
                    <div class="label">${item.title}</div>
                </div>`).join('')
            : '<p style="color:#88aacc;text-align:center;">Галерея пуста. Добавьте арты через админку.</p>';
        window._galleryData = galleryData;

        const guidesData = await loadJSON('/content/guides.json', []);
        document.getElementById('guides-content').innerHTML = guidesData.length > 0
            ? guidesData.map(g => `
                <div class="card">
                    <h3>${g.title}</h3>
                    <p><strong>Что это:</strong> ${g.description}</p>
                    ${g.install_pc && g.install_pc.length > 0 ? `
                    <p style="margin-top:10px;"><strong>📥 Установка на ПК:</strong></p>
                    <ol class="pixel-list">${g.install_pc.map(s => `<li>${s}</li>`).join('')}</ol>` : ''}
                    ${g.install_phone && g.install_phone.length > 0 ? `
                    <p style="margin-top:10px;"><strong>📱 На телефон:</strong></p>
                    <ol class="pixel-list">${g.install_phone.map(s => `<li>${s}</li>`).join('')}</ol>` : ''}
                    ${g.note ? `<div class="note">${g.note}</div>` : ''}
                </div>`).join('')
            : '<p style="color:#88aacc;text-align:center;">Гайды не добавлены.</p>';
    }

    function openGalleryItem(index) {
        const data = window._galleryData[index];
        if (!data) return;
        document.getElementById("modal-img").src = data.image || "";
        document.getElementById("modal-title").textContent = data.title || "Без названия";
        document.getElementById("modal-desc").textContent = data.description || "Описание отсутствует";
        document.getElementById("modal-overlay").classList.add("active");
    }

    function closeModal(event) {
        if (event && event.target !== document.getElementById("modal-overlay")) return;
        document.getElementById("modal-overlay").classList.remove("active");
    }

    function openTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.target.classList.add('active');
    }

    initContent();
</script>
</body>
</html>
