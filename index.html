<!DOCTYPE html>

<html lang="ru"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>WPlace — Obsidian Tech</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        :root {
            --surface: #0f0f1c;
            --surface-dim: #131319;
            --surface-bright: #16162e;
            --surface-container: #1b1b22;
            --accent: #00ff88;
            --text: #e0ffe0;
            --text-dim: #a0b0a0;
            --border: rgba(0, 255, 136, 0.2);
        }

        body {
            background-color: var(--surface);
            color: var(--text);
            font-family: 'Geist', sans-serif;
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(0, 255, 136, 0.05) 0%, transparent 50%),
                linear-gradient(rgba(0, 255, 136, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 136, 0.02) 1px, transparent 1px);
            background-size: 100% 100%, 30px 30px, 30px 30px;
        }

        .glass-panel {
            background: rgba(19, 19, 25, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .accent-glow {
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.2);
        }

        .tab-btn {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-bottom: 2px solid transparent;
        }

        .tab-btn.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
            background: rgba(0, 255, 136, 0.05);
        }

        .card-hover {
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        .card-hover:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
        }

        .pixel-list li {
            background: var(--surface-dim);
            border: 1px solid var(--border);
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .pixel-list li:hover {
            background: var(--surface-bright);
            border-color: var(--accent);
            padding-left: 1.25rem;
        }

        .btn-action {
            background: var(--accent);
            color: #000;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .btn-action:hover {
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
            filter: brightness(1.1);
        }

        .modal-blur {
            backdrop-filter: blur(8px);
            background: rgba(0, 0, 0, 0.8);
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--surface); }
        ::-webkit-scrollbar-thumb { background: var(--surface-container); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .tab-content { display: none; animation: slideIn 0.3s ease-out; }
        .tab-content.active { display: block; }

        .image-container {
            position: relative;
            overflow: hidden;
            border-radius: 8px;
            background: #000;
        }
        
        .image-container img {
            transition: transform 0.5s ease;
        }
        
        .image-container:hover img {
            transform: scale(1.05);
        }
    </style>
</head>
<body class="antialiased">
<div class="max-w-5xl mx-auto px-4 py-8">
<!-- Header -->
<header class="text-center mb-12">
<div class="inline-block px-6 py-2 rounded-full border border-[var(--accent)] bg-[rgba(0,255,136,0.05)] mb-4 text-xs font-bold tracking-[0.2em] text-[var(--accent)] uppercase">
            System Online
        </div>
<h1 class="text-5xl md:text-7xl font-black tracking-tighter text-white mb-2 site-title">⚔ WPLACE ⚔</h1>
<p class="text-[var(--text-dim)] font-medium text-lg site-subtitle">Пиксель-арт сообщество</p>
</header>
<!-- Navigation -->
<nav class="glass-panel flex justify-center p-1 mb-10 sticky top-4 z-50">
<div class="flex w-full md:w-auto gap-2">
<button class="tab-btn active flex items-center gap-2 px-6 py-3 rounded-lg font-bold text-sm" onclick="openTab('home')">
<span class="material-symbols-outlined text-xl">home</span> Главная
            </button>
<button class="tab-btn flex items-center gap-2 px-6 py-3 rounded-lg font-bold text-sm" onclick="openTab('gallery')">
<span class="material-symbols-outlined text-xl">grid_view</span> Галерея
            </button>
<button class="tab-btn flex items-center gap-2 px-6 py-3 rounded-lg font-bold text-sm" onclick="openTab('guides')">
<span class="material-symbols-outlined text-xl">menu_book</span> Гайды
            </button>
</div>
</nav>
<!-- Main Content -->
<main>
<div class="tab-content active space-y-8" id="home">
<div id="current-art-section"></div>
<div id="help-section"></div>
</div>
<div class="tab-content" id="gallery">
<div class="flex items-center gap-4 mb-8">
<span class="material-symbols-outlined text-[var(--accent)] text-3xl">history_edu</span>
<h2 class="text-3xl font-bold text-white">История артов</h2>
</div>
<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6" id="gallery-grid"></div>
</div>
<div class="tab-content" id="guides">
<div class="flex items-center gap-4 mb-8">
<span class="material-symbols-outlined text-[var(--accent)] text-3xl">settings_suggest</span>
<h2 class="text-3xl font-bold text-white">Установка расширений</h2>
</div>
<div class="space-y-6" id="guides-content"></div>
</div>
</main>
<!-- Footer -->
<footer class="mt-24 pt-8 border-t border-[var(--border)] text-center text-[var(--text-dim)] text-sm pb-12" id="site-footer">
<p>WPlace Pixel Art Community © 2025 | Obsidian Tech UI</p>
</footer>
</div>
<!-- Modal -->
<div class="modal-overlay fixed inset-0 z-[100] modal-blur flex items-center justify-center p-4 transition-opacity opacity-0 pointer-events-none" id="modal-overlay" onclick="closeModal(event)">
<div class="modal glass-panel w-full max-w-3xl max-h-[90vh] overflow-y-auto p-6 md:p-10 scale-95 transition-transform" id="modal-box">
<div class="flex justify-between items-center mb-6">
<span class="text-[var(--accent)] font-mono text-xs" id="modal-counter"></span>
<button class="text-[var(--text-dim)] hover:text-white transition-colors" onclick="closeModal()">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<div class="image-container mb-8 max-w-xl mx-auto border border-[var(--border)]">
<img alt="" class="w-full object-contain max-h-[50vh]" id="modal-img" src=""/>
</div>
<div class="text-center">
<h3 class="text-2xl font-bold text-white mb-4" id="modal-title"></h3>
<div class="text-[var(--text-dim)] leading-relaxed mb-8" id="modal-desc"></div>
<div class="flex flex-col sm:flex-row gap-4 justify-center items-center">
<button class="btn-action px-8 py-3 rounded-full flex items-center gap-2" id="modal-download" onclick="downloadModalImage()" style="display:none;">
<span class="material-symbols-outlined">download</span> Скачать арт
                </button>
<div class="flex items-center gap-4 bg-[var(--surface-container)] p-2 rounded-full" id="modal-nav-row">
<button class="w-10 h-10 rounded-full flex items-center justify-center hover:bg-[rgba(255,255,255,0.1)] transition-colors" id="modal-prev" onclick="navModal(-1)">
<span class="material-symbols-outlined">chevron_left</span>
</button>
<span class="font-mono text-sm text-white px-2" id="modal-nav-counter"></span>
<button class="w-10 h-10 rounded-full flex items-center justify-center hover:bg-[rgba(255,255,255,0.1)] transition-colors" id="modal-next" onclick="navModal(1)">
<span class="material-symbols-outlined">chevron_right</span>
</button>
</div>
</div>
</div>
</div>
</div>
<script>
    let currentGalleryIndex = 0;
    let currentStepIndex = 0;
    let currentStepType = '';
    let modalMode = 'gallery';

    function makeLinksClickable(text) {
        if (!text) return "";
        return text.replace(/(https?:\/\/[^\s<>]+)/g, '<a href="$1" target="_blank" class="text-[var(--accent)] hover:underline decoration-dashed">$1</a>');
    }

    function downloadImage(url, filename) {
        if (!url) return;
        const a = document.createElement('a');
        a.href = url;
        a.download = filename || 'art.png';
        a.target = '_blank';
        a.rel = 'noopener';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    }

    function downloadModalImage() {
        const img = document.getElementById('modal-img');
        if (img && img.src) downloadImage(img.src, 'wplace-art.png');
    }

    async function loadJSON(path, fallback) {
        try { const res = await fetch(path); if (!res.ok) throw new Error('not found'); return await res.json(); }
        catch { return fallback; }
    }

    async function initContent() {
        const settingsData = await loadJSON('/content/settings.json', {
            siteTitle: "WPlace — Пиксель-Арт Сообщество", headerTitle: "⚔ WPLACE ⚔",
            headerSubtitle: "Пиксель-арт сообщество", footer: "WPlace Pixel Art Community © 2025 | Obsidian Tech UI"
        });
        document.title = settingsData.siteTitle;
        document.querySelector(".site-title").textContent = settingsData.headerTitle;
        document.querySelector(".site-subtitle").textContent = settingsData.headerSubtitle;
        document.getElementById("site-footer").innerHTML = `<p>${settingsData.footer}</p>`;

        const homeData = await loadJSON('/content/home.json', {
            title: "", image: "", description: "", location: "", help_wplace: [], help_blue: [], help_helper: []
        });
        window._homeData = homeData;
        document.getElementById('current-art-section').innerHTML = `
            <div class="glass-panel p-6 md:p-8">
                <div class="flex items-center gap-3 mb-6">
                    <span class="material-symbols-outlined text-[var(--accent)]">target</span>
                    <h3 class="text-xl font-bold text-white">${homeData.title}</h3>
                </div>
                ${homeData.image ? `<div class="image-container max-w-2xl mx-auto border border-[var(--border)] mb-6"><img src="${homeData.image}" alt="Актуальный арт" class="w-full"></div>` : ''}
                <div class="text-lg text-[var(--text-dim)] text-center mb-8">${makeLinksClickable(homeData.description)}</div>
                ${homeData.location ? `
                    <div class="flex flex-col sm:flex-row gap-4 justify-center items-center pt-6 border-t border-[var(--border)]">
                        <a href="${homeData.location}" class="btn-action px-8 py-3 rounded-full flex items-center gap-2 text-sm uppercase tracking-wider" target="_blank">
                            <span class="material-symbols-outlined">map</span> Открыть на WPlace
                        </a>
                        ${homeData.image ? `<button class="bg-[var(--surface-container)] text-white hover:bg-[var(--surface-bright)] px-8 py-3 rounded-full flex items-center gap-2 text-sm uppercase transition-colors" onclick="downloadImage('${homeData.image}','wplace-art.png')"><span class="material-symbols-outlined">download</span> Скачать</button>` : ''}
                    </div>
                ` : (homeData.image ? `<div class="flex justify-center"><button class="btn-action px-8 py-3 rounded-full" onclick="downloadImage('${homeData.image}','wplace-art.png')">СКАЧАТЬ АРТ</button></div>` : '')}
            </div>`;

        document.getElementById('help-section').innerHTML = `
            <div class="glass-panel p-6 md:p-8">
                <div class="flex items-center gap-3 mb-6">
                    <span class="material-symbols-outlined text-[var(--accent)]">brush</span>
                    <h3 class="text-xl font-bold text-white">Как помочь с артом</h3>
                </div>
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div>
                        <p class="text-[var(--accent)] font-bold mb-4 flex items-center gap-2"><span class="material-symbols-outlined text-sm">flash_on</span> WPlace</p>
                        <ol class="pixel-list space-y-2 list-none">${renderStepsList(homeData.help_wplace, 'wplace')}</ol>
                    </div>
                    <div>
                        <p class="text-[var(--accent)] font-bold mb-4 flex items-center gap-2"><span class="material-symbols-outlined text-sm">language</span> Blue Marble</p>
                        <ol class="pixel-list space-y-2 list-none">${renderStepsList(homeData.help_blue, 'blue')}</ol>
                    </div>
                    <div>
                        <p class="text-[var(--accent)] font-bold mb-4 flex items-center gap-2"><span class="material-symbols-outlined text-sm">extension</span> WPlace Helper</p>
                        <ol class="pixel-list space-y-2 list-none">${renderStepsList(homeData.help_helper, 'helper')}</ol>
                    </div>
                </div>
            </div>`;

        const galleryData = await loadJSON('/content/gallery.json', []);
        window._galleryData = galleryData;
        renderGalleryGrid(galleryData);

        const guidesData = await loadJSON('/content/guides.json', []);
        window._guidesData = guidesData;
        document.getElementById('guides-content').innerHTML = guidesData.length > 0
            ? guidesData.map(g => {
                let html = '';
                if (g.install_pc && g.install_pc.length > 0) html += `<div class="bg-[var(--surface-container)] rounded-lg px-4 py-2 text-xs font-bold text-[var(--accent)] uppercase mb-3 mt-6 inline-block">💻 ПК</div><ol class="pixel-list space-y-2 list-none">${renderStepsList(g.install_pc, 'guide_pc_'+g.title)}</ol>`;
                if (g.install_phone && g.install_phone.length > 0) {
                    const sections = {};
                    g.install_phone.forEach(step => {
                        const sd = typeof step === 'object' ? step : { text: step, section: "" };
                        const name = sd.section || '📱 Телефон';
                        if (!sections[name]) sections[name] = [];
                        sections[name].push(sd);
                    });
                    ['📱 Android (Edge)', '📱 iPhone (iOS)', '📱 Телефон'].forEach(name => {
                        if (sections[name] && sections[name].length > 0) { html += `<div class="bg-[var(--surface-container)] rounded-lg px-4 py-2 text-xs font-bold text-[var(--accent)] uppercase mb-3 mt-6 inline-block">${name}</div><ol class="pixel-list space-y-2 list-none">${renderStepsList(sections[name], 'guide_phone_'+g.title)}</ol>`; delete sections[name]; }
                    });
                    for (const [title, steps] of Object.entries(sections)) if (steps.length > 0) html += `<div class="bg-[var(--surface-container)] rounded-lg px-4 py-2 text-xs font-bold text-[var(--accent)] uppercase mb-3 mt-6 inline-block">${title}</div><ol class="pixel-list space-y-2 list-none">${renderStepsList(steps, 'guide_phone_'+g.title)}</ol>`;
                }
                return `<div class="glass-panel p-6 md:p-8 mb-8">
                    <h3 class="text-2xl font-bold text-white mb-4">${g.title}</h3>
                    <p class="text-[var(--text-dim)] mb-4">${makeLinksClickable(g.description)}</p>
                    ${html}
                    ${g.note && g.note.toString().trim() ? `<div class="mt-8 p-4 rounded-lg bg-[rgba(0,255,136,0.03)] border-l-4 border-[var(--accent)] text-sm italic text-[var(--text-dim)]">${makeLinksClickable(g.note)}</div>` : ''}
                </div>`;
            }).join('')
            : '<p class="text-center py-12 text-[var(--text-dim)]">Гайды не добавлены.</p>';
    }

    function renderStepsList(steps, type) {
        if (!steps || steps.length === 0) return '<li class="p-3 opacity-50 italic">Пусто</li>';
        return steps.map((s, i) => {
            const stepData = typeof s === 'object' ? s : { text: s, image: "", detail: "" };
            return `<li class="p-4 flex items-center justify-between group cursor-pointer" onclick="openStepModal('${type}', ${i})">
                <span class="flex items-center gap-4">
                    <span class="w-6 h-6 flex items-center justify-center rounded-full bg-[var(--surface-bright)] text-[var(--accent)] text-xs font-bold border border-[var(--border)] group-hover:bg-[var(--accent)] group-hover:text-black transition-colors">${i + 1}</span>
                    <span class="text-sm font-medium">${makeLinksClickable(stepData.text || 'Шаг '+(i+1))}</span>
                </span>
                <span class="material-symbols-outlined opacity-0 group-hover:opacity-100 transition-opacity text-[var(--accent)]">arrow_forward</span>
            </li>`;
        }).join('');
    }

    function getStepData(type, index) {
        if (type === 'wplace') return window._homeData?.help_wplace?.[index] || { text: "", image: "", detail: "" };
        if (type === 'blue') return window._homeData?.help_blue?.[index] || { text: "", image: "", detail: "" };
        if (type === 'helper') return window._homeData?.help_helper?.[index] || { text: "", image: "", detail: "" };
        const parts = type.split('_');
        if (parts[0] === 'guide') {
            const guideType = parts[1], guideTitle = parts.slice(2).join('_');
            const guide = window._guidesData?.find(g => g.title === guideTitle);
            if (guide) { const steps = guideType === 'pc' ? (guide.install_pc || []) : (guide.install_phone || []); return steps[index] || { text: "", image: "", detail: "" }; }
        }
        return { text: "", image: "", detail: "" };
    }

    function openStepModal(type, index) {
        currentStepType = type; currentStepIndex = index; modalMode = 'step';
        showStepInModal();
        const overlay = document.getElementById("modal-overlay");
        overlay.classList.remove("pointer-events-none", "opacity-0");
        document.getElementById("modal-box").classList.remove("scale-95");
        document.getElementById("modal-nav-row").style.display = 'none';
        document.getElementById("modal-download").style.display = 'none';
    }

    function showStepInModal() {
        const data = getStepData(currentStepType, currentStepIndex);
        const stepData = typeof data === 'object' ? data : { text: data || "", image: "", detail: "" };
        const img = document.getElementById("modal-img");
        img.src = stepData.image || "";
        img.closest('.image-container').style.display = stepData.image ? 'block' : 'none';
        document.getElementById("modal-title").textContent = `Шаг ${currentStepIndex + 1}`;
        document.getElementById("modal-desc").innerHTML = `<div class="text-xl mb-6">${makeLinksClickable(stepData.text || "Нет описания")}</div>` + (stepData.detail && stepData.detail.toString().trim() ? '<div class="text-left p-4 rounded-lg bg-[var(--surface-container)] text-sm border border-[var(--border)]"><div class="text-[var(--accent)] font-bold mb-2 uppercase tracking-tighter text-[10px]">Подробности</div>' + makeLinksClickable(stepData.detail) + '</div>' : '');
        document.getElementById("modal-counter").textContent = "ИНСТРУКЦИЯ";
    }

    function renderGalleryGrid(data) {
        document.getElementById('gallery-grid').innerHTML = data.length > 0 ? data.map((item, i) => `
            <div class="glass-panel p-3 card-hover cursor-pointer" onclick="openGalleryItem(${i})">
                <div class="image-container aspect-square mb-4 border border-[var(--border)]">
                    ${item.image ? `<img src="${item.image}" alt="${item.title}" class="w-full h-full object-cover">` : '<div class="w-full h-full flex items-center justify-center bg-[var(--surface-container)]"><span class="material-symbols-outlined text-4xl opacity-20">image</span></div>'}
                </div>
                <h4 class="text-center font-bold text-white px-2 truncate">${item.title}</h4>
            </div>
        `).join('') : '<p class="col-span-full text-center py-12 text-[var(--text-dim)]">Галерея пуста.</p>';
    }

    function openGalleryItem(index) {
        currentGalleryIndex = index; modalMode = 'gallery';
        showGalleryModal();
        const overlay = document.getElementById("modal-overlay");
        overlay.classList.remove("pointer-events-none", "opacity-0");
        document.getElementById("modal-box").classList.remove("scale-95");
        document.getElementById("modal-nav-row").style.display = 'flex';
        document.getElementById("modal-download").style.display = 'flex';
    }

    function navModal(dir) {
        if (modalMode === 'gallery') { currentGalleryIndex += dir; if (currentGalleryIndex < 0) currentGalleryIndex = window._galleryData.length - 1; if (currentGalleryIndex >= window._galleryData.length) currentGalleryIndex = 0; showGalleryModal(); }
    }

    function showGalleryModal() {
        const data = window._galleryData[currentGalleryIndex]; if (!data) return;
        const img = document.getElementById("modal-img");
        img.closest('.image-container').style.display = 'block';
        img.src = data.image || "";
        document.getElementById("modal-title").textContent = data.title || "Без названия";
        document.getElementById("modal-desc").innerHTML = makeLinksClickable(data.description || "");
        document.getElementById("modal-counter").textContent = `АРХИВ • ${currentGalleryIndex + 1} / ${window._galleryData.length}`;
        document.getElementById("modal-nav-counter").textContent = `${currentGalleryIndex + 1} / ${window._galleryData.length}`;
    }

    function closeModal(event) { 
        if (event && event.target !== document.getElementById("modal-overlay") && !event.target.closest('.material-symbols-outlined')) return; 
        const overlay = document.getElementById("modal-overlay");
        overlay.classList.add("pointer-events-none", "opacity-0");
        document.getElementById("modal-box").classList.add("scale-95");
    }

    function openTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    document.addEventListener('keydown', function(e) {
        const overlay = document.getElementById("modal-overlay");
        if (overlay.classList.contains("opacity-0")) return;
        if (e.key === "Escape") closeModal();
        if (modalMode === 'gallery') { if (e.key === "ArrowLeft") navModal(-1); if (e.key === "ArrowRight") navModal(1); }
    });

    initContent();
</script>
</body></html>
