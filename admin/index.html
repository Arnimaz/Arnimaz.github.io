<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masters_of_Cum Admin</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');
        :root {
            --bg: #0a0f0a; --surface: #0d1a0d; --surface2: #0f1f0f; --border: #00aa44;
            --border-dim: #1a3a1a; --text: #c0ffc0; --text-dim: #669966; --glow: #00ff66;
            --accent2: #88ff88; --danger: #ff4444; --warning: #ffaa00; --info: #44aaff;
            --sidebar: #080e08;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg); color: var(--text);
            font-family: 'VT323', monospace; font-size: 18px; min-height: 100vh;
        }

        .sidebar {
            width: 240px; min-width: 240px; background: var(--sidebar);
            border-right: 3px solid var(--border); padding: 20px 0;
            display: flex; flex-direction: column; z-index: 10;
            box-shadow: 4px 0 20px rgba(0,0,0,0.5);
        }
        .sidebar-logo {
            text-align: center; padding: 0 15px 20px;
            border-bottom: 2px solid var(--border-dim); margin-bottom: 15px;
        }
        .sidebar-logo .logo-title {
            font-family: 'Press Start 2P', monospace; font-size: 11px;
            color: var(--glow); text-shadow: 0 0 10px var(--glow); line-height: 1.6;
        }
        .sidebar-logo .logo-sub { font-size: 14px; color: var(--text-dim); margin-top: 4px; }
        .sidebar-nav { flex: 1; padding: 0 10px; }
        .sidebar-nav button {
            display: block; width: 100%; text-align: left;
            font-family: 'Press Start 2P', monospace; font-size: 9px;
            padding: 12px 14px; margin-bottom: 4px;
            background: transparent; color: var(--text-dim);
            border: 2px solid transparent; cursor: pointer;
            transition: all 0.1s step-end; text-transform: uppercase;
        }
        .sidebar-nav button:hover { border-color: var(--border-dim); color: var(--text); background: var(--surface); }
        .sidebar-nav button.active {
            border-color: var(--border); color: var(--glow);
            background: #0a2a0a; text-shadow: 0 0 8px var(--glow);
            box-shadow: inset 0 0 10px rgba(0,255,102,0.1);
        }
        .sidebar-footer { padding: 15px; border-top: 2px solid var(--border-dim); display: flex; flex-direction: column; gap: 6px; }

        .main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .topbar {
            background: var(--surface); border-bottom: 3px solid var(--border);
            padding: 10px 20px; display: flex; align-items: center;
            justify-content: space-between; flex-wrap: wrap; gap: 10px;
        }
        .topbar-title { font-family: 'Press Start 2P', monospace; font-size: 12px; color: var(--glow); }
        .topbar-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
        .quick-search {
            background: #050a05; border: 2px solid var(--border-dim); color: var(--glow);
            font-family: 'VT323', monospace; font-size: 16px; padding: 6px 10px; width: 180px;
        }
        .quick-search:focus { border-color: var(--glow); outline: none; }
        .content-area { flex: 1; overflow-y: auto; padding: 20px; }

        .btn {
            font-family: 'Press Start 2P', monospace; font-size: 8px; padding: 8px 12px;
            background: var(--surface2); color: var(--text); border: 2px solid var(--border-dim);
            cursor: pointer; transition: all 0.1s step-end; text-transform: uppercase;
            box-shadow: 0 3px 0 #0a1a0a; text-decoration: none; white-space: nowrap;
        }
        .btn:hover { border-color: var(--glow); color: #fff; text-shadow: 0 0 10px var(--glow); transform: translateY(-2px); }
        .btn:active { transform: translateY(1px); box-shadow: 0 1px 0 var(--glow); }
        .btn-primary { background: #0a2a0a; border-color: var(--border); color: var(--glow); }
        .btn-danger { background: #1a0a0a; border-color: #4a2a2a; color: #ff8888; }
        .btn-warning { background: #1a1a0a; border-color: #4a4a2a; color: var(--warning); }
        .btn-info { background: #0a1a2a; border-color: #2a4a5a; color: var(--info); }
        .btn-full { width: 100%; font-size: 10px; padding: 14px; }

        .card { border: 2px solid var(--border-dim); background: var(--surface); padding: 16px; margin-bottom: 14px; }
        .card-header {
            font-family: 'Press Start 2P', monospace; font-size: 10px; color: var(--accent2);
            margin-bottom: 10px; padding-bottom: 8px; border-bottom: 2px solid var(--border-dim);
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 6px;
        }
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; }

        .form-group { margin-bottom: 10px; }
        .form-label { display: block; font-size: 16px; color: var(--accent2); margin-bottom: 3px; }
        .form-input {
            width: 100%; padding: 8px 10px; background: #050a05; border: 2px solid var(--border-dim);
            color: var(--glow); font-family: 'VT323', monospace; font-size: 17px; outline: none;
        }
        .form-input:focus { border-color: var(--glow); box-shadow: 0 0 10px rgba(0,255,102,0.1); }
        textarea.form-input { resize: vertical; min-height: 60px; line-height: 1.4; }

        .gallery-admin-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
        .gallery-admin-card { border: 2px solid var(--border-dim); background: #0a0f0a; padding: 12px; }
        .gallery-admin-card .preview-img { width: 100%; aspect-ratio: 1; object-fit: contain; image-rendering: pixelated; border: 2px solid #1a3a1a; background: #050510; margin-bottom: 10px; display: block; }
        .gallery-admin-card .no-img { width: 100%; aspect-ratio: 1; background: repeating-linear-gradient(45deg,#1a1a30 0px,#1a1a30 8px,#111128 8px,#111128 16px); border: 2px solid #1a3a1a; display: flex; align-items: center; justify-content: center; color: #4a4a6a; font-size: 14px; margin-bottom: 10px; }
        .gallery-admin-card input, .gallery-admin-card textarea { width: 100%; padding: 7px 8px; background: #050a05; border: 2px solid var(--border-dim); color: var(--glow); font-family: 'VT323', monospace; font-size: 16px; margin-bottom: 6px; }
        .gallery-admin-card .card-actions { display: flex; gap: 4px; flex-wrap: wrap; justify-content: space-between; align-items: center; margin-top: 4px; }

        .step-admin-item { border: 2px solid var(--border-dim); background: #0a0f0a; padding: 10px; margin-bottom: 6px; }
        .step-admin-item input, .step-admin-item textarea, .step-admin-item select { width: 100%; padding: 6px 8px; background: #050a05; border: 2px solid var(--border-dim); color: var(--glow); font-family: 'VT323', monospace; font-size: 16px; margin-bottom: 4px; }
        .step-admin-item .row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
        .step-admin-item .row input, .step-admin-item .row select { flex: 1; min-width: 80px; }

        .guide-item-admin { border: 2px solid var(--border-dim); background: #0a0f0a; padding: 12px; margin-bottom: 10px; }
        .section-header { font-family: 'Press Start 2P', monospace; font-size: 9px; color: var(--accent2); margin: 8px 0 5px; padding: 5px 8px; background: #0a1a0a; border: 2px solid var(--border-dim); display: flex; justify-content: space-between; align-items: center; }

        .toast {
            position: fixed; bottom: 20px; right: 20px; z-index: 10000;
            padding: 12px 18px; border: 3px solid; font-family: 'Press Start 2P', monospace;
            font-size: 9px; animation: slideUp 0.2s step-end; max-width: 400px;
        }
        .toast-success { background: #0a2a0a; border-color: var(--glow); color: var(--glow); }
        .toast-error { background: #2a0a0a; border-color: var(--danger); color: var(--danger); }
        .toast-info { background: #0a1a2a; border-color: var(--info); color: var(--info); }
        @keyframes slideUp { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .login-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card {
            width: 100%; max-width: 420px; border: 5px solid var(--border);
            background: var(--surface); padding: 30px; text-align: center;
            box-shadow: 0 0 30px rgba(0,170,68,0.2);
        }
        .login-title { font-family: 'Press Start 2P', monospace; font-size: 16px; color: var(--glow); text-shadow: 0 0 15px var(--glow); margin-bottom: 4px; }
        .login-subtitle { font-size: 18px; color: var(--text-dim); margin-bottom: 22px; }
        .hidden { display: none !important; }

        @media (max-width: 768px) {
            .admin-layout { flex-direction: column; }
            .sidebar { width: 100%; min-width: 100%; flex-direction: row; flex-wrap: wrap; padding: 8px; gap: 4px; border-right: none; border-bottom: 3px solid var(--border); }
            .sidebar-logo { display: none; }
            .sidebar-nav { display: flex; gap: 4px; padding: 0; }
            .sidebar-nav button { font-size: 7px; padding: 8px 10px; flex: 1; text-align: center; }
            .sidebar-footer { display: none; }
            .gallery-admin-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-page" class="login-container">
    <div class="login-card">
        <div class="login-title">Masters_of_Cum</div>
        <div class="login-subtitle">ADMIN PANEL</div>
        <div class="form-group"><label class="form-label">🔑 Token</label><input type="password" id="token-input" class="form-input" placeholder="ghp_..." autofocus></div>
        <button class="btn btn-primary btn-full" onclick="login()">▶ ВОЙТИ</button>
    </div>
</div>

<!-- ADMIN -->
<div id="admin-page" class="hidden" style="display:none;">
    <div class="admin-layout" style="display:flex;min-height:100vh;">
        <!-- SIDEBAR -->
        <div class="sidebar">
            <div class="sidebar-logo">
                <div class="logo-title">Masters_of_Cum</div>
                <div class="logo-sub">ADMIN CONSOLE</div>
            </div>
            <div class="sidebar-nav">
                <button class="active" onclick="switchTab('home-tab', this)">🏠 Главная</button>
                <button onclick="switchTab('gallery-tab', this)">🖼 Галерея</button>
                <button onclick="switchTab('guides-tab', this)">📚 Гайды</button>
                <button onclick="switchTab('settings-tab', this)">⚙ Настройки</button>
            </div>
            <div class="sidebar-footer">
                <a href="/" class="btn btn-info btn-full" target="_blank">🌐 ОТКРЫТЬ САЙТ</a>
                <button class="btn btn-warning btn-full" onclick="loadAll()">🔄 ОБНОВИТЬ ДАННЫЕ</button>
                <button class="btn btn-danger btn-full" onclick="logout()">🚪 ВЫХОД</button>
            </div>
        </div>

        <!-- MAIN -->
        <div class="main-area">
            <div class="topbar">
                <div class="topbar-title">Masters_of_Cum_ADMIN</div>
                <div class="topbar-actions">
                    <input type="text" class="quick-search" placeholder="Поиск..." oninput="quickSearch(this.value)">
                    <button class="btn btn-primary" onclick="publishAll()">💾 СОХРАНИТЬ ВСЁ</button>
                </div>
            </div>
            <div class="content-area">
                <!-- HOME TAB -->
                <div id="home-tab" class="tab-content">
                    <div class="card-grid">
                        <div class="card">
                            <div class="card-header">🎯 АКТУАЛЬНЫЙ АРТ</div>
                            <div class="form-group"><label class="form-label">Заголовок</label><input type="text" id="home-title" class="form-input"></div>
                            <div class="form-group"><label class="form-label">Ссылка на картинку</label><input type="text" id="home-image" class="form-input" oninput="previewHomeImage()"></div>
                            <div class="form-group"><label class="form-label">Описание</label><textarea id="home-desc" class="form-input" rows="3"></textarea></div>
                            <div class="form-group"><label class="form-label">Ссылка WPlace</label><input type="text" id="home-location" class="form-input"></div>
                            <div id="home-image-preview" class="hidden" style="border:2px dashed var(--border);background:#050a05;padding:10px;margin-top:10px;text-align:center;"><img id="home-preview-img" src="" style="max-width:100%;max-height:180px;" alt=""></div>
                        </div>
                        <div class="card"><div class="card-header">🖌 WPlace <button class="btn btn-primary" onclick="addStep('wplace')">+</button></div><div id="steps-wplace"></div></div>
                    </div>
                    <div class="card-grid">
                        <div class="card"><div class="card-header">🔷 Blue Marble <button class="btn btn-primary" onclick="addStep('blue')">+</button></div><div id="steps-blue"></div></div>
                        <div class="card"><div class="card-header">🧩 WPlace Helper <button class="btn btn-primary" onclick="addStep('helper')">+</button></div><div id="steps-helper"></div></div>
                    </div>
                    <button class="btn btn-primary btn-full" onclick="saveHome()">💾 СОХРАНИТЬ ГЛАВНУЮ</button>
                </div>

                <!-- GALLERY TAB -->
                <div id="gallery-tab" class="tab-content hidden">
                    <div class="card"><div class="card-header">🖼 ГАЛЕРЕЯ <div style="display:flex;gap:6px;"><button class="btn btn-primary" onclick="addGalleryItem()">+ ДОБАВИТЬ</button><button class="btn btn-warning" onclick="sortGallery()">🔤 СОРТИРОВКА</button></div></div><div class="gallery-admin-grid" id="gallery-items"></div></div>
                    <button class="btn btn-primary btn-full" onclick="saveGallery()">💾 СОХРАНИТЬ ГАЛЕРЕЮ</button>
                </div>

                <!-- GUIDES TAB -->
                <div id="guides-tab" class="tab-content hidden">
                    <div class="card"><div class="card-header">📚 ГАЙДЫ <button class="btn btn-primary" onclick="addGuideItem()">+ ДОБАВИТЬ</button></div><div id="guides-items"></div></div>
                    <button class="btn btn-primary btn-full" onclick="saveGuides()">💾 СОХРАНИТЬ ГАЙДЫ</button>
                </div>

                <!-- SETTINGS TAB -->
                <div id="settings-tab" class="tab-content hidden">
                    <div class="card-grid">
                        <div class="card">
                            <div class="card-header">⚙ ОБЩИЕ НАСТРОЙКИ</div>
                            <div class="form-group"><label class="form-label">Название сайта</label><input type="text" id="settings-siteTitle" class="form-input"></div>
                            <div class="form-group"><label class="form-label">Заголовок</label><input type="text" id="settings-headerTitle" class="form-input"></div>
                            <div class="form-group"><label class="form-label">Подзаголовок</label><input type="text" id="settings-headerSubtitle" class="form-input"></div>
                            <div class="form-group"><label class="form-label">Футер</label><textarea id="settings-footer" class="form-input" rows="2"></textarea></div>
                        </div>
                        <div class="card">
                            <div class="card-header">🔧 ИНСТРУМЕНТЫ</div>
                            <button class="btn btn-warning" onclick="if(confirm('Сбросить все данные?')) resetAll()" style="width:100%;margin-bottom:6px;">⚠ СБРОСИТЬ ВСЁ</button>
                            <button class="btn btn-info" onclick="exportAll()" style="width:100%;margin-bottom:6px;">📥 ЭКСПОРТ ДАННЫХ</button>
                            <button class="btn btn-info" onclick="importAll()" style="width:100%;margin-bottom:6px;">📤 ИМПОРТ ДАННЫХ</button>
                            <input type="file" id="import-file" accept=".json" class="hidden" onchange="handleImport(event)">
                        </div>
                    </div>
                    <button class="btn btn-primary btn-full" onclick="saveSettings()">💾 СОХРАНИТЬ НАСТРОЙКИ</button>
                </div>
            </div>
        </div>
    </div>
</div>
<div id="toast" class="toast hidden"></div>

<script>
    const REPO_OWNER = "Arnimaz", REPO_NAME = "Arnimaz.github.io", BRANCH = "main";
    let token = sessionStorage.getItem("wplace_admin_token");
    let homeData = {}, galleryData = [], guidesData = [], settingsData = {};
    if (token) { showAdmin(); loadAll(); }

    function toast(msg, type) {
        const t = document.getElementById("toast");
        t.textContent = msg; t.className = `toast toast-${type}`;
        clearTimeout(t._t); t._t = setTimeout(() => t.classList.add("hidden"), 3500);
    }

    function quickSearch(query) {
        if (!query) return;
        const q = query.toLowerCase();
        if (q.includes("арт") || q.includes("art")) switchTab("home-tab", document.querySelector('.sidebar-nav button'));
        else if (q.includes("галер") || q.includes("gallery")) switchTab("gallery-tab", document.querySelectorAll('.sidebar-nav button')[1]);
        else if (q.includes("гайд") || q.includes("guide")) switchTab("guides-tab", document.querySelectorAll('.sidebar-nav button')[2]);
        else if (q.includes("настр") || q.includes("setting")) switchTab("settings-tab", document.querySelectorAll('.sidebar-nav button')[3]);
    }

    async function login() {
        const input = document.getElementById("token-input");
        if (!input) return;
        token = input.value.trim();
        if (!token) return toast("Введите токен", "error");
        try {
            const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}`, { headers: { Authorization: `token ${token}` } });
            if (res.ok) { sessionStorage.setItem("wplace_admin_token", token); showAdmin(); await loadAll(); toast("✅ Доступ разрешён", "success"); }
            else toast("❌ Неверный токен", "error");
        } catch(e) { toast("❌ Ошибка соединения", "error"); }
    }
    function logout() { sessionStorage.removeItem("wplace_admin_token"); location.reload(); }
    function showAdmin() {
        const lp = document.getElementById("login-page");
        const ap = document.getElementById("admin-page");
        if (lp) lp.classList.add("hidden");
        if (ap) { ap.classList.remove("hidden"); ap.style.display = "block"; }
    }

    async function loadJSON(path) {
        const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${path}?ref=${BRANCH}`, { headers: { Authorization: `token ${token}`, Accept: "application/vnd.github.v3+json" } });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        return { content: JSON.parse(decodeURIComponent(escape(atob(data.content.replace(/\n/g, ""))))), sha: data.sha };
    }
    async function saveJSON(path, content, sha) {
        const body = { message: `📝 Update ${path}`, content: btoa(unescape(encodeURIComponent(JSON.stringify(content, null, 2)))), sha: sha, branch: BRANCH };
        const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${path}`, { method: "PUT", headers: { Authorization: `token ${token}`, "Content-Type": "application/json" }, body: JSON.stringify(body) });
        if (!res.ok) { const err = await res.json().catch(() => ({})); throw new Error(err.message || `HTTP ${res.status}`); }
        return (await res.json()).content.sha;
    }
    async function loadAll() {
        let errs = 0;
        try { const h = await loadJSON("content/home.json"); homeData = h.content; homeData._sha = h.sha; renderHome(); } catch(e) { toast("❌ Главная", "error"); errs++; }
        try { const g = await loadJSON("content/gallery.json"); galleryData = g.content; galleryData._sha = g.sha; renderGallery(); } catch(e) { toast("❌ Галерея", "error"); errs++; }
        try { const gu = await loadJSON("content/guides.json"); guidesData = gu.content; guidesData._sha = gu.sha; renderGuides(); } catch(e) { toast("❌ Гайды", "error"); errs++; }
        try { const s = await loadJSON("content/settings.json"); settingsData = s.content; settingsData._sha = s.sha; renderSettings(); } catch(e) { settingsData = { siteTitle: "WPlace", headerTitle: "⚔ WPLACE ⚔", headerSubtitle: "Пиксель-арт сообщество", footer: "© 2025" }; renderSettings(); }
        if (errs === 0) toast("✅ Данные загружены", "success");
    }

    function renderHome() {
        document.getElementById("home-title").value = homeData.title || "";
        document.getElementById("home-image").value = homeData.image || "";
        document.getElementById("home-desc").value = homeData.description || "";
        document.getElementById("home-location").value = homeData.location || "";
        renderStepsAdmin("wplace", homeData.help_wplace || []);
        renderStepsAdmin("blue", homeData.help_blue || []);
        renderStepsAdmin("helper", homeData.help_helper || []);
        previewHomeImage();
    }
    function renderStepsAdmin(type, steps) {
        const el = document.getElementById(`steps-${type}`);
        if (!el) return;
        el.innerHTML = steps.length === 0 ? '<p style="color:var(--text-dim);padding:8px;">Пусто</p>' : steps.map((s, i) => {
            const sd = typeof s === 'object' ? s : { text: s, image: "", detail: "" };
            return `<div class="step-admin-item">
                <div class="row"><span style="font-family:Press Start 2P;font-size:10px;color:var(--accent2);min-width:22px;">${i+1}.</span><input value="${(sd.text||'').replace(/"/g,'&quot;')}" onchange="updateStepField('${type}',${i},'text',this.value)" placeholder="Текст шага"></div>
                <input value="${sd.image||''}" onchange="updateStepField('${type}',${i},'image',this.value)" placeholder="Ссылка на фото">
                <textarea onchange="updateStepField('${type}',${i},'detail',this.value)" placeholder="Подробности" rows="2">${(sd.detail||'').replace(/</g,'&lt;')}</textarea>
                <button class="btn btn-danger" onclick="removeStep('${type}',${i})" style="margin-top:4px;">✕ Удалить</button>
            </div>`;
        }).join("");
    }
    function addStep(type) { const key = type==="wplace"?"help_wplace":type==="blue"?"help_blue":"help_helper"; if(!homeData[key])homeData[key]=[]; homeData[key].push({text:"",image:"",detail:""}); renderStepsAdmin(type, homeData[key]); }
    function updateStepField(type, i, field, v) { const key = type==="wplace"?"help_wplace":type==="blue"?"help_blue":"help_helper"; if(typeof homeData[key][i]!=='object')homeData[key][i]={text:homeData[key][i]||"",image:"",detail:""}; homeData[key][i][field]=v; }
    function removeStep(type, i) { const key = type==="wplace"?"help_wplace":type==="blue"?"help_blue":"help_helper"; homeData[key].splice(i,1); renderStepsAdmin(type, homeData[key]); }
    function previewHomeImage() {
        const url = document.getElementById("home-image").value;
        const p = document.getElementById("home-image-preview"), img = document.getElementById("home-preview-img");
        if (url) { p.classList.remove("hidden"); img.src = url; img.onerror = () => { img.style.display = "none"; p.innerHTML += '<p style="color:#ff4444;">Ошибка</p>'; }; img.onload = () => { img.style.display = "block"; }; }
        else p.classList.add("hidden");
    }
    async function saveHome() {
        homeData.title = document.getElementById("home-title").value;
        homeData.image = document.getElementById("home-image").value;
        homeData.description = document.getElementById("home-desc").value;
        homeData.location = document.getElementById("home-location").value;
        ['wplace', 'blue', 'helper'].forEach(type => {
            const key = type==="wplace"?"help_wplace":type==="blue"?"help_blue":"help_helper";
            const container = document.getElementById(`steps-${type}`);
            if (container) {
                const items = container.querySelectorAll('.step-admin-item');
                const steps = [];
                items.forEach(item => {
                    const inputs = item.querySelectorAll('input');
                    if (inputs.length > 0 && inputs[0].value.trim()) {
                        steps.push({ text: inputs[0].value, image: inputs.length > 1 ? inputs[1].value : '', detail: item.querySelector('textarea') ? item.querySelector('textarea').value : '' });
                    }
                });
                if (steps.length > 0) homeData[key] = steps;
            }
        });
        try { homeData._sha = await saveJSON("content/home.json", homeData, homeData._sha); toast("✅ Главная сохранена!", "success"); } catch(e) { toast("❌ "+e.message, "error"); }
    }

    function renderGallery() {
        const el = document.getElementById("gallery-items");
        if (!el) return;
        if (galleryData.length === 0) { el.innerHTML = '<p style="color:var(--text-dim);text-align:center;padding:40px;">Пусто</p>'; return; }
        el.innerHTML = galleryData.map((item, i) => `
            <div class="gallery-admin-card">
                ${item.image ? `<img src="${item.image}" class="preview-img">` : '<div class="no-img">[НЕТ]</div>'}
                <input placeholder="Название" value="${item.title||''}" onchange="galleryData[${i}].title=this.value">
                <textarea placeholder="Описание" rows="2" onchange="galleryData[${i}].description=this.value">${item.description||''}</textarea>
                <input placeholder="Ссылка на картинку" value="${item.image||''}" onchange="galleryData[${i}].image=this.value;renderGallery();">
                <div class="card-actions"><div><button class="btn btn-info" onclick="moveGalleryItem(${i},-1)">▲</button><button class="btn btn-info" onclick="moveGalleryItem(${i},1)">▼</button></div><button class="btn btn-danger" onclick="if(confirm('Удалить?')){galleryData.splice(${i},1);renderGallery();}">✕</button></div>
            </div>`).join("");
    }
    function addGalleryItem() { galleryData.push({ title: "", description: "", image: "" }); renderGallery(); }
    function moveGalleryItem(i, d) { const n = i+d; if(n<0||n>=galleryData.length)return; [galleryData[i], galleryData[n]] = [galleryData[n], galleryData[i]]; renderGallery(); }
    function sortGallery() { galleryData.sort((a,b) => (a.title||"").localeCompare(b.title||"")); renderGallery(); }
    async function saveGallery() { try { galleryData._sha = await saveJSON("content/gallery.json", galleryData, galleryData._sha); toast("✅ Галерея сохранена!", "success"); } catch(e) { toast("❌ "+e.message, "error"); } }

    function renderGuides() {
        const el = document.getElementById("guides-items");
        if (!el) return;
        if (guidesData.length === 0) { el.innerHTML = '<p style="color:var(--text-dim);text-align:center;padding:40px;">Пусто</p>'; return; }
        el.innerHTML = guidesData.map((g, i) => `
            <div class="guide-item-admin">
                <div style="display:flex;justify-content:space-between;"><strong style="color:var(--accent2);">Гайд #${i+1}</strong><button class="btn btn-danger" onclick="if(confirm('Удалить?')){guidesData.splice(${i},1);renderGuides();}">✕</button></div>
                <input class="form-input" placeholder="Название" value="${g.title||''}" onchange="guidesData[${i}].title=this.value" style="margin:6px 0;">
                <textarea class="form-input" placeholder="Описание" rows="2" onchange="guidesData[${i}].description=this.value">${g.description||''}</textarea>
                <div class="section-header">💻 ПК <button class="btn btn-primary" onclick="addGuideStep(${i},'pc')">+</button></div>
                <div id="guide-pc-${i}">${renderGuideStepsHTML(g.install_pc||[], i, 'pc')}</div>
                <div class="section-header">📱 Телефон <button class="btn btn-primary" onclick="addGuideStep(${i},'phone')">+</button></div>
                <div id="guide-phone-${i}">${renderGuideStepsHTML(g.install_phone||[], i, 'phone')}</div>
                <input class="form-input" placeholder="Примечание" value="${g.note||''}" onchange="guidesData[${i}].note=this.value" style="margin-top:6px;">
            </div>`).join("");
    }
    function renderGuideStepsHTML(steps, gi, type) {
        if (!steps || steps.length === 0) return '<p style="color:var(--text-dim);font-size:14px;padding:8px;">Пусто</p>';
        return steps.map((s, si) => {
            const sd = typeof s === 'object' ? s : { text: s, image: "", detail: "", section: "" };
            return `<div class="step-admin-item">
                <div class="row">
                    <input value="${(sd.text||'').replace(/"/g,'&quot;')}" onchange="updateGuideField(${gi},'${type}',${si},'text',this.value)" placeholder="Текст" style="flex:2;">
                    <select onchange="updateGuideField(${gi},'${type}',${si},'section',this.value)" style="flex:1;padding:6px 8px;background:#050a05;border:2px solid var(--border-dim);color:var(--glow);font-family:'VT323',monospace;font-size:16px;">
                        <option value="">Без раздела</option>
                        <option value="💻 ПК" ${sd.section=='💻 ПК'?'selected':''}>💻 ПК</option>
                        <option value="📱 Android (Edge)" ${sd.section=='📱 Android (Edge)'?'selected':''}>📱 Android (Edge)</option>
                        <option value="📱 iPhone (iOS)" ${sd.section=='📱 iPhone (iOS)'?'selected':''}>📱 iPhone (iOS)</option>
                    </select>
                </div>
                <input value="${sd.image||''}" onchange="updateGuideField(${gi},'${type}',${si},'image',this.value)" placeholder="Фото (ссылка)">
                <textarea onchange="updateGuideField(${gi},'${type}',${si},'detail',this.value)" placeholder="Подробности" rows="2">${(sd.detail||'').replace(/</g,'&lt;')}</textarea>
                <button class="btn btn-danger" onclick="guidesData[${gi}].install_${type}.splice(${si},1);renderGuides();">✕</button>
            </div>`;
        }).join("");
    }
    function updateGuideField(gi, type, si, field, v) {
        const key = `install_${type}`;
        if (!guidesData[gi][key]) guidesData[gi][key] = [];
        if (typeof guidesData[gi][key][si] !== 'object') guidesData[gi][key][si] = { text: guidesData[gi][key][si] || "", image: "", detail: "", section: "" };
        guidesData[gi][key][si][field] = v;
    }
    function addGuideItem() { guidesData.push({ title: "", description: "", install_pc: [], install_phone: [], note: "" }); renderGuides(); }
    function addGuideStep(gi, type) { const key = `install_${type}`; if(!guidesData[gi][key])guidesData[gi][key]=[]; guidesData[gi][key].push({text:"",image:"",detail:"",section:""}); renderGuides(); }
    async function saveGuides() { try { guidesData._sha = await saveJSON("content/guides.json", guidesData, guidesData._sha); toast("✅ Гайды сохранены!", "success"); } catch(e) { toast("❌ "+e.message, "error"); } }

    function renderSettings() {
        document.getElementById("settings-siteTitle").value = settingsData.siteTitle || "";
        document.getElementById("settings-headerTitle").value = settingsData.headerTitle || "";
        document.getElementById("settings-headerSubtitle").value = settingsData.headerSubtitle || "";
        document.getElementById("settings-footer").value = settingsData.footer || "";
    }
    async function saveSettings() {
        settingsData.siteTitle = document.getElementById("settings-siteTitle").value;
        settingsData.headerTitle = document.getElementById("settings-headerTitle").value;
        settingsData.headerSubtitle = document.getElementById("settings-headerSubtitle").value;
        settingsData.footer = document.getElementById("settings-footer").value;
        try { settingsData._sha = settingsData._sha ? await saveJSON("content/settings.json", settingsData, settingsData._sha) : await saveJSON("content/settings.json", settingsData, null); toast("✅ Настройки сохранены!", "success"); } catch(e) { toast("❌ "+e.message, "error"); } }
    }

    async function publishAll() {
        toast("🚀 Сохранение...", "info");
        try { await saveHome(); await saveGallery(); await saveGuides(); await saveSettings(); toast("✅ Всё опубликовано!", "success"); }
        catch(e) { toast("❌ Ошибка", "error"); }
    }

    async function resetAll() {
        homeData = { title: "", image: "", description: "", location: "", help_wplace: [], help_blue: [], help_helper: [] };
        galleryData = []; guidesData = [];
        settingsData = { siteTitle: "WPlace", headerTitle: "⚔ WPLACE ⚔", headerSubtitle: "Пиксель-арт сообщество", footer: "© 2025" };
        try {
            homeData._sha = await saveJSON("content/home.json", homeData, homeData._sha);
            galleryData._sha = await saveJSON("content/gallery.json", galleryData, galleryData._sha);
            guidesData._sha = await saveJSON("content/guides.json", guidesData, guidesData._sha);
            settingsData._sha = settingsData._sha ? await saveJSON("content/settings.json", settingsData, settingsData._sha) : await saveJSON("content/settings.json", settingsData, null);
            renderHome(); renderGallery(); renderGuides(); renderSettings(); toast("✅ Сброшено", "success");
        } catch(e) { toast("❌ "+e.message, "error"); }
    }
    function exportAll() {
        const data = { home: homeData, gallery: galleryData, guides: guidesData, settings: settingsData, date: new Date().toISOString() };
        delete data.home._sha; delete data.gallery._sha; delete data.guides._sha; delete data.settings._sha;
        const b = new Blob([JSON.stringify(data,null,2)],{type:"application/json"}); const a = document.createElement("a"); a.href = URL.createObjectURL(b); a.download = `wplace-backup.json`; a.click();
    }
    function importAll() { document.getElementById("import-file").click(); }
    function handleImport(e) {
        const f = e.target.files[0]; if(!f)return; const r = new FileReader();
        r.onload = function(ev) { try { const d = JSON.parse(ev.target.result); if(d.home){homeData=d.home;renderHome();} if(d.gallery){galleryData=d.gallery;renderGallery();} if(d.guides){guidesData=d.guides;renderGuides();} if(d.settings){settingsData=d.settings;renderSettings();} toast("📤 Импортировано!", "info"); } catch(er) { toast("❌ Ошибка", "error"); } };
        r.readAsText(f); e.target.value = "";
    }

    function switchTab(tabId, btn) {
        document.querySelectorAll(".tab-content").forEach(t => t.classList.add("hidden"));
        document.querySelectorAll(".sidebar-nav button").forEach(b => b.classList.remove("active"));
        const tab = document.getElementById(tabId);
        if (tab) tab.classList.remove("hidden");
        if (btn) btn.classList.add("active");
    }

    document.addEventListener("keydown", function(e) {
        if ((e.ctrlKey||e.metaKey) && e.key === "s") { e.preventDefault(); publishAll(); }
        if (e.key === "F5") { e.preventDefault(); loadAll(); }
    });
    document.getElementById("token-input").addEventListener("keydown", e => { if(e.key==="Enter")login(); });
</script>

</body>
</html>
