<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WPlace Admin Pro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');
        :root {
            --bg: #0a0f0a; --surface: #0d1a0d; --surface2: #0f1f0f; --border: #00aa44;
            --border-dim: #1a3a1a; --text: #c0ffc0; --text-dim: #669966; --glow: #00ff66;
            --accent2: #88ff88; --danger: #ff4444; --warning: #ffaa00; --info: #44aaff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg); background-image: linear-gradient(0deg, rgba(0,170,68,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,170,68,0.03) 1px, transparent 1px);
            background-size: 8px 8px; color: var(--text); font-family: 'VT323', monospace; font-size: 20px; min-height: 100vh; image-rendering: pixelated;
        }
        .header { position: relative; z-index: 1; border-bottom: 4px solid var(--border); background: var(--surface); padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
        .header-left { display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
        .header-title { font-family: 'Press Start 2P', monospace; font-size: 13px; color: var(--glow); text-shadow: 0 0 10px var(--glow); }
        .header-status { font-size: 15px; color: var(--text-dim); }
        .header-status .dot { display: inline-block; width: 8px; height: 8px; background: var(--glow); box-shadow: 0 0 6px var(--glow); margin-right: 4px; }
        .btn { font-family: 'Press Start 2P', monospace; font-size: 9px; padding: 8px 12px; background: var(--surface2); color: var(--text); border: 3px solid var(--border-dim); cursor: pointer; transition: all 0.1s step-end; text-transform: uppercase; box-shadow: 0 3px 0 #0a1a0a; text-decoration: none; white-space: nowrap; }
        .btn:hover { border-color: var(--glow); color: #fff; text-shadow: 0 0 10px var(--glow); transform: translateY(-2px); }
        .btn-primary { background: #0a2a0a; border-color: var(--border); color: var(--glow); box-shadow: 0 3px 0 #0a4a0a; }
        .btn-danger { background: #1a0a0a; border-color: #4a2a2a; color: #ff8888; }
        .btn-warning { background: #1a1a0a; border-color: #4a4a2a; color: var(--warning); }
        .btn-info { background: #0a1a2a; border-color: #2a4a5a; color: var(--info); }
        .btn-small { font-size: 7px; padding: 5px 8px; }
        .btn-full { width: 100%; font-size: 11px; padding: 14px; }
        .main-container { position: relative; z-index: 1; max-width: 1300px; margin: 0 auto; padding: 15px; }
        .tabs { display: flex; gap: 4px; margin-bottom: 15px; flex-wrap: wrap; }
        .tab-btn { font-family: 'Press Start 2P', monospace; font-size: 9px; padding: 10px 14px; background: var(--surface2); color: var(--text-dim); border: 3px solid var(--border-dim); cursor: pointer; text-transform: uppercase; box-shadow: 0 3px 0 #0a0f0a; transition: all 0.1s step-end; }
        .tab-btn:hover { border-color: var(--accent2); color: var(--accent2); }
        .tab-btn.active { background: #0a2a0a; border-color: var(--border); color: var(--glow); text-shadow: 0 0 10px var(--glow); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .card { border: 3px solid var(--border-dim); background: var(--surface); padding: 18px; margin-bottom: 15px; }
        .card-header { font-family: 'Press Start 2P', monospace; font-size: 11px; color: var(--accent2); margin-bottom: 12px; padding-bottom: 8px; border-bottom: 2px solid var(--border-dim); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 6px; }
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 14px; }
        .form-group { margin-bottom: 12px; }
        .form-label { display: block; font-size: 17px; color: var(--accent2); margin-bottom: 4px; }
        .form-input { width: 100%; padding: 9px 10px; background: #050a05; border: 2px solid var(--border-dim); color: var(--glow); font-family: 'VT323', monospace; font-size: 19px; outline: none; }
        .form-input:focus { border-color: var(--glow); box-shadow: 0 0 10px rgba(0,255,102,0.1); }
        textarea.form-input { resize: vertical; min-height: 70px; line-height: 1.5; }
        .help-text { font-size: 13px; color: var(--text-dim); margin-top: 3px; }
        .gallery-admin-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
        .gallery-admin-card { border: 2px solid var(--border-dim); background: #0a0f0a; padding: 14px; }
        .gallery-admin-card .preview-img { width: 100%; aspect-ratio: 1; object-fit: contain; image-rendering: pixelated; border: 2px solid #1a3a1a; background: #050510; margin-bottom: 12px; display: block; }
        .gallery-admin-card .no-img { width: 100%; aspect-ratio: 1; background: repeating-linear-gradient(45deg,#1a1a30 0px,#1a1a30 8px,#111128 8px,#111128 16px); border: 2px solid #1a3a1a; display: flex; align-items: center; justify-content: center; color: #4a4a6a; font-size: 16px; margin-bottom: 12px; }
        .gallery-admin-card input, .gallery-admin-card textarea { width: 100%; padding: 8px 10px; background: #050a05; border: 2px solid var(--border-dim); color: var(--glow); font-family: 'VT323', monospace; font-size: 18px; margin-bottom: 7px; }
        .gallery-admin-card textarea { min-height: 55px; resize: vertical; }
        .gallery-admin-card .card-actions { display: flex; gap: 6px; flex-wrap: wrap; justify-content: space-between; align-items: center; margin-top: 6px; }
        .step-admin-item { border: 2px solid var(--border-dim); background: #0a0f0a; padding: 12px; margin-bottom: 8px; }
        .step-admin-item input, .step-admin-item textarea, .step-admin-item select { width: 100%; padding: 7px 8px; background: #050a05; border: 2px solid var(--border-dim); color: var(--glow); font-family: 'VT323', monospace; font-size: 17px; margin-bottom: 5px; }
        .step-admin-item textarea { min-height: 50px; resize: vertical; }
        .step-admin-item .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .step-admin-item .row input, .step-admin-item .row select { flex: 1; min-width: 100px; }
        .guide-item-admin { border: 2px solid var(--border-dim); background: #0a0f0a; padding: 14px; margin-bottom: 10px; }
        .section-header { font-family: 'Press Start 2P', monospace; font-size: 10px; color: var(--accent2); margin: 10px 0 6px; padding: 6px 10px; background: #0a1a0a; border: 2px solid var(--border-dim); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 6px; }
        .preview-box { border: 2px dashed var(--border); background: #050a05; padding: 12px; margin-top: 12px; text-align: center; max-height: 250px; overflow-y: auto; }
        .preview-box img { max-width: 100%; max-height: 200px; image-rendering: pixelated; border: 2px solid #1a3a1a; }
        .toast { position: fixed; top: 15px; right: 15px; z-index: 10000; padding: 12px 18px; border: 3px solid; font-family: 'Press Start 2P', monospace; font-size: 9px; animation: slideIn 0.2s step-end; max-width: 400px; }
        .toast-success { background: #0a2a0a; border-color: var(--glow); color: var(--glow); }
        .toast-error { background: #2a0a0a; border-color: var(--danger); color: var(--danger); }
        .toast-info { background: #0a1a2a; border-color: var(--info); color: var(--info); }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .login-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 15px; }
        .login-card { position: relative; z-index: 1; width: 100%; max-width: 440px; border: 5px solid var(--border); background: var(--surface); padding: 30px; text-align: center; box-shadow: 0 0 30px rgba(0,170,68,0.2); }
        .login-title { font-family: 'Press Start 2P', monospace; font-size: 16px; color: var(--glow); text-shadow: 0 0 15px var(--glow); margin-bottom: 4px; }
        .login-subtitle { font-size: 19px; color: var(--text-dim); margin-bottom: 22px; }
        .login-help { font-size: 13px; color: var(--text-dim); margin-top: 15px; line-height: 1.5; }
        .login-help a { color: var(--glow); }
        .hidden { display: none !important; }
        .stats-bar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px; }
        .stat-item { flex: 1; min-width: 100px; border: 2px solid var(--border-dim); background: var(--surface); padding: 10px 14px; text-align: center; }
        .stat-value { font-family: 'Press Start 2P', monospace; font-size: 18px; color: var(--glow); }
        .stat-label { font-size: 13px; color: var(--text-dim); margin-top: 3px; }
        @media (max-width: 768px) { .gallery-admin-grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); } .tabs { flex-direction: column; } .tab-btn { text-align: center; font-size: 8px; padding: 8px; } }
        @media (max-width: 400px) { .gallery-admin-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div id="login-page" class="login-container">
    <div class="login-card">
        <div class="login-title">⚔ WPLACE ⚔</div>
        <div class="login-subtitle">ADMIN PRO v10.0</div>
        <div class="form-group"><label class="form-label">🔑 GitHub Token</label><input type="password" id="token-input" class="form-input" placeholder="ghp_..." autofocus></div>
        <button class="btn btn-primary btn-full" onclick="login()">▶ ВОЙТИ</button>
        <div class="login-help">Токен с правами <strong>repo</strong><br><a href="https://github.com/settings/tokens/new" target="_blank">Создать токен →</a></div>
    </div>
</div>

<div id="admin-page" class="hidden">
    <div class="header">
        <div class="header-left"><div class="header-title">⚔ WPLACE ADMIN v10.0</div><div class="header-status"><span class="dot"></span>ONLINE</div></div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;">
            <a href="/" class="btn btn-small btn-info" target="_blank">🌐 САЙТ</a>
            <button class="btn btn-small btn-warning" onclick="loadAll()">🔄</button>
            <button class="btn btn-small btn-danger" onclick="logout()">🚪</button>
        </div>
    </div>
    <div class="main-container">
        <div class="stats-bar">
            <div class="stat-item"><div class="stat-value" id="stat-art">-</div><div class="stat-label">Акт. арт</div></div>
            <div class="stat-item"><div class="stat-value" id="stat-gallery">-</div><div class="stat-label">Галерея</div></div>
            <div class="stat-item"><div class="stat-value" id="stat-guides">-</div><div class="stat-label">Гайды</div></div>
            <div class="stat-item"><div class="stat-value" id="stat-steps">-</div><div class="stat-label">Шаги</div></div>
        </div>
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('home-tab')">🏠 Главная</button>
            <button class="tab-btn" onclick="switchTab('gallery-tab')">🖼 Галерея</button>
            <button class="tab-btn" onclick="switchTab('guides-tab')">📚 Гайды</button>
            <button class="tab-btn" onclick="switchTab('settings-tab')">⚙ Настройки</button>
        </div>

        <!-- ГЛАВНАЯ -->
        <div id="home-tab" class="tab-content active">
            <div class="card-grid">
                <div class="card">
                    <div class="card-header">🎯 АКТУАЛЬНЫЙ АРТ</div>
                    <div class="form-group"><label class="form-label">Заголовок</label><input type="text" id="home-title" class="form-input"></div>
                    <div class="form-group"><label class="form-label">Ссылка на картинку</label><input type="text" id="home-image" class="form-input" oninput="previewHomeImage()"></div>
                    <div class="form-group"><label class="form-label">Описание</label><textarea id="home-desc" class="form-input" rows="3"></textarea></div>
                    <div class="form-group"><label class="form-label">Ссылка WPlace</label><input type="text" id="home-location" class="form-input"></div>
                    <div id="home-image-preview" class="preview-box hidden"><img id="home-preview-img" src="" alt=""></div>
                </div>
                <div class="card"><div class="card-header">🖌 WPlace <button class="btn btn-small btn-primary" onclick="addStep('wplace')">+</button></div><div id="steps-wplace"></div></div>
            </div>
            <div class="card-grid">
                <div class="card"><div class="card-header">🔷 Blue Marble <button class="btn btn-small btn-primary" onclick="addStep('blue')">+</button></div><div id="steps-blue"></div></div>
                <div class="card"><div class="card-header">🧩 WPlace Helper <button class="btn btn-small btn-primary" onclick="addStep('helper')">+</button></div><div id="steps-helper"></div></div>
            </div>
            <button class="btn btn-primary btn-full" onclick="saveHome()">💾 СОХРАНИТЬ ГЛАВНУЮ</button>
        </div>

        <!-- ГАЛЕРЕЯ -->
        <div id="gallery-tab" class="tab-content">
            <div class="card"><div class="card-header">🖼 ГАЛЕРЕЯ <button class="btn btn-small btn-primary" onclick="addGalleryItem()">+</button><button class="btn btn-small btn-warning" onclick="sortGallery()">🔤</button></div><div class="gallery-admin-grid" id="gallery-items"></div></div>
            <button class="btn btn-primary btn-full" onclick="saveGallery()">💾 СОХРАНИТЬ ГАЛЕРЕЮ</button>
        </div>

        <!-- ГАЙДЫ -->
        <div id="guides-tab" class="tab-content">
            <div class="card"><div class="card-header">📚 ГАЙДЫ <button class="btn btn-small btn-primary" onclick="addGuideItem()">+</button></div><div id="guides-items"></div></div>
            <button class="btn btn-primary btn-full" onclick="saveGuides()">💾 СОХРАНИТЬ ГАЙДЫ</button>
        </div>

        <!-- НАСТРОЙКИ -->
        <div id="settings-tab" class="tab-content">
            <div class="card-grid">
                <div class="card">
                    <div class="card-header">⚙ ОБЩИЕ</div>
                    <div class="form-group"><label class="form-label">Название сайта</label><input type="text" id="settings-siteTitle" class="form-input"></div>
                    <div class="form-group"><label class="form-label">Заголовок</label><input type="text" id="settings-headerTitle" class="form-input"></div>
                    <div class="form-group"><label class="form-label">Подзаголовок</label><input type="text" id="settings-headerSubtitle" class="form-input"></div>
                    <div class="form-group"><label class="form-label">Футер</label><textarea id="settings-footer" class="form-input" rows="2"></textarea></div>
                </div>
                <div class="card">
                    <div class="card-header">🔧 ДЕЙСТВИЯ</div>
                    <button class="btn btn-warning" onclick="if(confirm('Сбросить?')) resetAll()" style="width:100%;margin-bottom:8px;">⚠ СБРОСИТЬ</button>
                    <button class="btn btn-info" onclick="exportAll()" style="width:100%;margin-bottom:8px;">📥 ЭКСПОРТ</button>
                    <button class="btn btn-info" onclick="importAll()" style="width:100%;">📤 ИМПОРТ</button>
                    <input type="file" id="import-file" accept=".json" class="hidden" onchange="handleImport(event)">
                </div>
                <div class="card"><div class="card-header">📊 СТАТИСТИКА</div>
                    <p>Артов: <strong id="stats-gallery-count">0</strong></p>
                    <p>Гайдов: <strong id="stats-guides-count">0</strong></p>
                    <p>Шагов: <strong id="stats-steps-count">0</strong></p>
                    <p>Сохранение: <strong id="stats-last-save">-</strong></p>
                </div>
            </div>
            <button class="btn btn-primary btn-full" onclick="saveSettings()">💾 СОХРАНИТЬ НАСТРОЙКИ</button>
        </div>
    </div>
</div>
<div id="toast" class="toast hidden"></div>

<script>
    const REPO_OWNER = "Arnimaz", REPO_NAME = "Arnimaz.github.io", BRANCH = "main";
    let token = sessionStorage.getItem("wplace_admin_token");
    let homeData = {}, galleryData = [], guidesData = [], settingsData = {};
    if (token) { showAdmin(); loadAll(); }

    async function login() {
        token = document.getElementById("token-input").value.trim();
        if (!token) return toast("Введите токен", "error");
        const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}`, { headers: { Authorization: `token ${token}` } });
        if (res.ok) { sessionStorage.setItem("wplace_admin_token", token); showAdmin(); await loadAll(); toast("✅ Доступ", "success"); }
        else toast("❌ Неверный токен", "error");
    }
    function logout() { sessionStorage.removeItem("wplace_admin_token"); location.reload(); }
    function showAdmin() { document.getElementById("login-page").classList.add("hidden"); document.getElementById("admin-page").classList.remove("hidden"); }

    async function loadJSON(path) {
        const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${path}?ref=${BRANCH}`, { headers: { Authorization: `token ${token}`, Accept: "application/vnd.github.v3+json" } });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        return { content: JSON.parse(decodeURIComponent(escape(atob(data.content.replace(/\n/g, ""))))), sha: data.sha };
    }
    async function saveJSON(path, content, sha) {
        const body = { message: `📝 Update ${path}`, content: btoa(unescape(encodeURIComponent(JSON.stringify(content, null, 2)))), sha: sha, branch: BRANCH };
        const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${path}`, { method: "PUT", headers: { Authorization: `token ${token}`, "Content-Type": "application/json" }, body: JSON.stringify(body) });
        if (!res.ok) { const err = await res.json().catch(() => ({})); throw new Error(err.message || `HTTP ${res.status}`); }
        return (await res.json()).content.sha;
    }

    async function loadAll() {
        let errs = 0;
        try { const h = await loadJSON("content/home.json"); homeData = h.content; homeData._sha = h.sha; renderHome(); } catch(e) { toast("❌ Главная", "error"); errs++; }
        try { const g = await loadJSON("content/gallery.json"); galleryData = g.content; galleryData._sha = g.sha; renderGallery(); } catch(e) { toast("❌ Галерея", "error"); errs++; }
        try { const gu = await loadJSON("content/guides.json"); guidesData = gu.content; guidesData._sha = gu.sha; renderGuides(); } catch(e) { toast("❌ Гайды", "error"); errs++; }
        try { const s = await loadJSON("content/settings.json"); settingsData = s.content; settingsData._sha = s.sha; renderSettings(); } catch(e) { settingsData = { siteTitle: "WPlace", headerTitle: "⚔ WPLACE ⚔", headerSubtitle: "Пиксель-арт сообщество", footer: "© 2025" }; renderSettings(); }
        updateStats(); if (errs === 0) toast("✅ Загружено", "success");
    }
    function updateStats() {
        const total = (homeData.help_wplace || []).length + (homeData.help_blue || []).length + (homeData.help_helper || []).length;
        document.getElementById("stat-art").textContent = homeData.title ? "✓" : "✗";
        document.getElementById("stat-gallery").textContent = galleryData.length;
        document.getElementById("stat-guides").textContent = guidesData.length;
        document.getElementById("stat-steps").textContent = total;
        document.getElementById("stats-gallery-count").textContent = galleryData.length;
        document.getElementById("stats-guides-count").textContent = guidesData.length;
        document.getElementById("stats-steps-count").textContent = total;
    }

    // HOME
    function renderHome() {
        document.getElementById("home-title").value = homeData.title || "";
        document.getElementById("home-image").value = homeData.image || "";
        document.getElementById("home-desc").value = homeData.description || "";
        document.getElementById("home-location").value = homeData.location || "";
        renderStepsAdmin("wplace", homeData.help_wplace || []);
        renderStepsAdmin("blue", homeData.help_blue || []);
        renderStepsAdmin("helper", homeData.help_helper || []);
        previewHomeImage(); updateStats();
    }
    function renderStepsAdmin(type, steps) {
        const el = document.getElementById(`steps-${type}`);
        el.innerHTML = steps.length === 0 ? '<p style="color:var(--text-dim);padding:8px;">Пусто</p>' : steps.map((s, i) => {
            const stepData = typeof s === 'object' ? s : { text: s, image: "", detail: "" };
            return `<div class="step-admin-item">
                <div class="row"><span style="font-family:Press Start 2P;font-size:10px;color:var(--accent2);min-width:22px;">${i+1}.</span><input value="${(stepData.text||'').replace(/"/g, '&quot;')}" onchange="updateStepField('${type}',${i},'text',this.value)" placeholder="Текст шага"></div>
                <input value="${stepData.image||''}" onchange="updateStepField('${type}',${i},'image',this.value)" placeholder="Ссылка на фото">
                <textarea onchange="updateStepField('${type}',${i},'detail',this.value)" placeholder="Подробности" rows="2">${(stepData.detail||'').replace(/</g, '&lt;')}</textarea>
                <button class="btn btn-small btn-danger" onclick="removeStep('${type}',${i})" style="margin-top:5px;">✕ Удалить</button>
            </div>`;
        }).join("");
    }
    function addStep(type) { const key = type==="wplace"?"help_wplace":type==="blue"?"help_blue":"help_helper"; if(!homeData[key])homeData[key]=[]; homeData[key].push({text:"",image:"",detail:""}); renderStepsAdmin(type, homeData[key]); }
    function updateStepField(type, i, field, v) { const key = type==="wplace"?"help_wplace":type==="blue"?"help_blue":"help_helper"; if(typeof homeData[key][i]!=='object')homeData[key][i]={text:homeData[key][i]||"",image:"",detail:""}; homeData[key][i][field]=v; }
    function removeStep(type, i) { const key = type==="wplace"?"help_wplace":type==="blue"?"help_blue":"help_helper"; homeData[key].splice(i,1); renderStepsAdmin(type, homeData[key]); }
    function previewHomeImage() {
        const url = document.getElementById("home-image").value;
        const p = document.getElementById("home-image-preview"), img = document.getElementById("home-preview-img");
        if (url) { p.classList.remove("hidden"); img.src = url; img.onerror = () => { img.style.display = "none"; p.innerHTML += '<p style="color:#ff4444;">Ошибка</p>'; }; img.onload = () => { img.style.display = "block"; }; }
        else p.classList.add("hidden");
    }
    async function saveHome() {
        homeData.title = document.getElementById("home-title").value;
        homeData.image = document.getElementById("home-image").value;
        homeData.description = document.getElementById("home-desc").value;
        homeData.location = document.getElementById("home-location").value;
        try { homeData._sha = await saveJSON("content/home.json", homeData, homeData._sha); document.getElementById("stats-last-save").textContent = new Date().toLocaleTimeString(); updateStats(); toast("✅ Сохранено!", "success"); } catch(e) { toast("❌ "+e.message, "error"); }
    }

    // GALLERY
    function renderGallery() {
        const el = document.getElementById("gallery-items");
        if (galleryData.length === 0) { el.innerHTML = '<p style="color:var(--text-dim);text-align:center;padding:40px;grid-column:1/-1;">Пусто</p>'; return; }
        el.innerHTML = galleryData.map((item, i) => `
            <div class="gallery-admin-card">
                ${item.image ? `<img src="${item.image}" class="preview-img">` : '<div class="no-img">[НЕТ]</div>'}
                <input placeholder="Название" value="${item.title||''}" onchange="galleryData[${i}].title=this.value">
                <textarea placeholder="Описание" rows="2" onchange="galleryData[${i}].description=this.value">${item.description||''}</textarea>
                <input placeholder="Ссылка на картинку" value="${item.image||''}" onchange="galleryData[${i}].image=this.value;renderGallery();">
                <div class="card-actions"><div><button class="btn btn-small btn-info" onclick="moveGalleryItem(${i},-1)">▲</button><button class="btn btn-small btn-info" onclick="moveGalleryItem(${i},1)">▼</button></div><button class="btn btn-small btn-danger" onclick="if(confirm('Удалить?')){galleryData.splice(${i},1);renderGallery();}">✕</button></div>
            </div>`).join("");
        updateStats();
    }
    function addGalleryItem() { galleryData.push({ title: "", description: "", image: "" }); renderGallery(); }
    function moveGalleryItem(i, d) { const n = i+d; if(n<0||n>=galleryData.length)return; [galleryData[i], galleryData[n]] = [galleryData[n], galleryData[i]]; renderGallery(); }
    function sortGallery() { galleryData.sort((a,b) => (a.title||"").localeCompare(b.title||"")); renderGallery(); }
    async function saveGallery() { try { galleryData._sha = await saveJSON("content/gallery.json", galleryData, galleryData._sha); document.getElementById("stats-last-save").textContent = new Date().toLocaleTimeString(); updateStats(); toast("✅ Сохранено!", "success"); } catch(e) { toast("❌ "+e.message, "error"); } }

    // GUIDES
    function renderGuides() {
        const el = document.getElementById("guides-items");
        if (guidesData.length === 0) { el.innerHTML = '<p style="color:var(--text-dim);text-align:center;padding:40px;">Пусто</p>'; return; }
        el.innerHTML = guidesData.map((g, i) => `
            <div class="guide-item-admin">
                <div style="display:flex;justify-content:space-between;"><strong style="color:var(--accent2);">Гайд #${i+1}</strong><button class="btn btn-small btn-danger" onclick="if(confirm('Удалить?')){guidesData.splice(${i},1);renderGuides();}">✕</button></div>
                <input class="form-input" placeholder="Название" value="${g.title||''}" onchange="guidesData[${i}].title=this.value" style="margin:6px 0;">
                <textarea class="form-input" placeholder="Описание" rows="2" onchange="guidesData[${i}].description=this.value">${g.description||''}</textarea>
                <div class="section-header">💻 ПК <button class="btn btn-small btn-primary" onclick="addGuideStep(${i},'pc')">+</button></div>
                <div id="guide-pc-${i}">${renderGuideStepsHTML(g.install_pc||[], i, 'pc')}</div>
                <div class="section-header">📱 Телефон <button class="btn btn-small btn-primary" onclick="addGuideStep(${i},'phone')">+</button></div>
                <div id="guide-phone-${i}">${renderGuideStepsHTML(g.install_phone||[], i, 'phone')}</div>
                <input class="form-input" placeholder="Примечание" value="${g.note||''}" onchange="guidesData[${i}].note=this.value" style="margin-top:6px;">
            </div>`).join("");
        updateStats();
    }
    function renderGuideStepsHTML(steps, gi, type) {
        if (!steps || steps.length === 0) return '<p style="color:var(--text-dim);font-size:14px;padding:8px;">Пусто</p>';
        return steps.map((s, si) => {
            const sd = typeof s === 'object' ? s : { text: s, image: "", detail: "", section: "" };
            return `<div class="step-admin-item">
                <div class="row">
                    <input value="${(sd.text||'').replace(/"/g, '&quot;')}" onchange="updateGuideField(${gi},'${type}',${si},'text',this.value)" placeholder="Текст" style="flex:2;">
                    <select onchange="updateGuideField(${gi},'${type}',${si},'section',this.value)" style="flex:1;padding:7px 8px;background:#050a05;border:2px solid var(--border-dim);color:var(--glow);font-family:'VT323',monospace;font-size:17px;">
                        <option value="">Без раздела</option>
                        <option value="💻 ПК" ${sd.section=='💻 ПК'?'selected':''}>💻 ПК</option>
                        <option value="📱 Android (Edge)" ${sd.section=='📱 Android (Edge)'?'selected':''}>📱 Android (Edge)</option>
                        <option value="📱 iPhone (iOS)" ${sd.section=='📱 iPhone (iOS)'?'selected':''}>📱 iPhone (iOS)</option>
                    </select>
                </div>
                <input value="${sd.image||''}" onchange="updateGuideField(${gi},'${type}',${si},'image',this.value)" placeholder="Фото (ссылка)">
                <textarea onchange="updateGuideField(${gi},'${type}',${si},'detail',this.value)" placeholder="Подробности" rows="2">${(sd.detail||'').replace(/</g, '&lt;')}</textarea>
                <button class="btn btn-small btn-danger" onclick="guidesData[${gi}].install_${type}.splice(${si},1);renderGuides();">✕</button>
            </div>`;
        }).join("");
    }
    function updateGuideField(gi, type, si, field, v) {
        const key = `install_${type}`;
        if (!guidesData[gi][key]) guidesData[gi][key] = [];
        if (typeof guidesData[gi][key][si] !== 'object') guidesData[gi][key][si] = { text: guidesData[gi][key][si] || "", image: "", detail: "", section: "" };
        guidesData[gi][key][si][field] = v;
    }
    function addGuideItem() { guidesData.push({ title: "", description: "", install_pc: [], install_phone: [], note: "" }); renderGuides(); }
    function addGuideStep(gi, type) { const key = `install_${type}`; if(!guidesData[gi][key])guidesData[gi][key]=[]; guidesData[gi][key].push({text:"",image:"",detail:"",section:""}); renderGuides(); }
    async function saveGuides() { try { guidesData._sha = await saveJSON("content/guides.json", guidesData, guidesData._sha); document.getElementById("stats-last-save").textContent = new Date().toLocaleTimeString(); updateStats(); toast("✅ Сохранено!", "success"); } catch(e) { toast("❌ "+e.message, "error"); } }

    // SETTINGS
    function renderSettings() {
        document.getElementById("settings-siteTitle").value = settingsData.siteTitle || "";
        document.getElementById("settings-headerTitle").value = settingsData.headerTitle || "";
        document.getElementById("settings-headerSubtitle").value = settingsData.headerSubtitle || "";
        document.getElementById("settings-footer").value = settingsData.footer || "";
    }
    async function saveSettings() {
        settingsData.siteTitle = document.getElementById("settings-siteTitle").value;
        settingsData.headerTitle = document.getElementById("settings-headerTitle").value;
        settingsData.headerSubtitle = document.getElementById("settings-headerSubtitle").value;
        settingsData.footer = document.getElementById("settings-footer").value;
        try { settingsData._sha = settingsData._sha ? await saveJSON("content/settings.json", settingsData, settingsData._sha) : await saveJSON("content/settings.json", settingsData, null); document.getElementById("stats-last-save").textContent = new Date().toLocaleTimeString(); toast("✅ Настройки сохранены!", "success"); } catch(e) { toast("❌ "+e.message, "error"); }
    }

    async function resetAll() {
        homeData = { title: "", image: "", description: "", location: "", help_wplace: [], help_blue: [], help_helper: [] };
        galleryData = []; guidesData = [];
        settingsData = { siteTitle: "WPlace", headerTitle: "⚔ WPLACE ⚔", headerSubtitle: "Пиксель-арт сообщество", footer: "© 2025" };
        try {
            homeData._sha = await saveJSON("content/home.json", homeData, homeData._sha);
            galleryData._sha = await saveJSON("content/gallery.json", galleryData, galleryData._sha);
            guidesData._sha = await saveJSON("content/guides.json", guidesData, guidesData._sha);
            settingsData._sha = settingsData._sha ? await saveJSON("content/settings.json", settingsData, settingsData._sha) : await saveJSON("content/settings.json", settingsData, null);
            renderHome(); renderGallery(); renderGuides(); renderSettings(); toast("✅ Сброшено", "success");
        } catch(e) { toast("❌ "+e.message, "error"); }
    }
    function exportAll() {
        const data = { home: homeData, gallery: galleryData, guides: guidesData, settings: settingsData, date: new Date().toISOString() };
        delete data.home._sha; delete data.gallery._sha; delete data.guides._sha; delete data.settings._sha;
        const b = new Blob([JSON.stringify(data,null,2)],{type:"application/json"}); const a = document.createElement("a"); a.href = URL.createObjectURL(b); a.download = `wplace-backup.json`; a.click();
    }
    function importAll() { document.getElementById("import-file").click(); }
    function handleImport(e) {
        const f = e.target.files[0]; if(!f)return; const r = new FileReader();
        r.onload = function(ev) { try { const d = JSON.parse(ev.target.result); if(d.home){homeData=d.home;renderHome();} if(d.gallery){galleryData=d.gallery;renderGallery();} if(d.guides){guidesData=d.guides;renderGuides();} if(d.settings){settingsData=d.settings;renderSettings();} updateStats(); } catch(er) { toast("❌ Ошибка", "error"); } };
        r.readAsText(f); e.target.value = "";
    }

    function switchTab(tabId) {
        document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        document.getElementById(tabId).classList.add("active");
        event.target.classList.add("active");
    }
    function toast(msg, type) { const t = document.getElementById("toast"); t.textContent = msg; t.className = `toast toast-${type}`; clearTimeout(t._t); t._t = setTimeout(() => t.classList.add("hidden"), 3500); }
    document.addEventListener("keydown", function(e) { if((e.ctrlKey||e.metaKey)&&e.key==="s"){ e.preventDefault(); const at = document.querySelector(".tab-content.active"); if(at.id==="home-tab")saveHome(); else if(at.id==="gallery-tab")saveGallery(); else if(at.id==="guides-tab")saveGuides(); else if(at.id==="settings-tab")saveSettings(); } });
    document.getElementById("token-input").addEventListener("keydown", e => { if(e.key==="Enter")login(); });
</script>

</body>
</html>
