<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WPlace Admin — Pixel Console</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');

        :root {
            --bg: #0a0f0a;
            --surface: #0d1a0d;
            --border: #00aa44;
            --text: #c0ffc0;
            --glow: #00ff66;
            --accent: #33cc33;
            --accent2: #88ff88;
            --danger: #ff4444;
            --warning: #ffaa00;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            background-image:
                linear-gradient(0deg, rgba(0,170,68,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,170,68,0.04) 1px, transparent 1px);
            background-size: 8px 8px;
            color: var(--text);
            font-family: 'VT323', monospace;
            font-size: 18px;
            min-height: 100vh;
            image-rendering: pixelated;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        body::before {
            content: "";
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px);
            pointer-events: none; z-index: 9999;
        }

        body::after {
            content: "";
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(ellipse at center, transparent 60%, rgba(0,10,0,0.5) 100%);
            pointer-events: none; z-index: 9998;
        }

        .console-container {
            position: relative; z-index: 1;
            width: 90%; max-width: 800px;
            border: 6px solid var(--border);
            background: var(--surface);
            box-shadow:
                inset 0 0 60px rgba(0,170,68,0.15),
                0 0 30px rgba(0,170,68,0.3),
                0 0 80px rgba(0,170,68,0.1);
            padding: 40px;
            text-align: center;
            image-rendering: pixelated;
        }

        .console-header {
            border-bottom: 3px solid var(--border);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .console-title {
            font-family: 'Press Start 2P', monospace;
            font-size: 18px;
            color: var(--glow);
            text-shadow: 0 0 15px var(--glow), 0 0 40px var(--glow);
            letter-spacing: 2px;
            line-height: 1.8;
        }

        .console-subtitle {
            font-family: 'VT323', monospace;
            font-size: 22px;
            color: var(--accent2);
            text-shadow: 0 0 8px rgba(136,255,136,0.5);
            margin-top: 8px;
        }

        .blink {
            animation: blink 1.2s step-end infinite;
            color: var(--glow);
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .login-box {
            border: 3px solid #1a3a1a;
            background: #0a150a;
            padding: 30px;
            margin: 20px 0;
            box-shadow: 0 4px 0 #0a1a0a;
        }

        .login-box h3 {
            font-family: 'Press Start 2P', monospace;
            font-size: 13px;
            color: var(--accent2);
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(136,255,136,0.4);
        }

        .pixel-btn {
            font-family: 'Press Start 2P', monospace;
            font-size: 14px;
            padding: 16px 32px;
            background: #0a2a0a;
            color: var(--glow);
            border: 4px solid var(--border);
            cursor: pointer;
            transition: all 0.1s step-end;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 4px 0 #0a4a0a;
            image-rendering: pixelated;
            display: inline-block;
            margin: 10px;
            text-decoration: none;
        }

        .pixel-btn:hover {
            background: #0d3a0d;
            border-color: var(--glow);
            color: #ffffff;
            text-shadow: 0 0 20px var(--glow);
            box-shadow: 0 4px 0 var(--glow), 0 0 30px rgba(0,255,102,0.3);
            transform: translateY(-2px);
        }

        .pixel-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 var(--glow);
        }

        .pixel-input {
            font-family: 'VT323', monospace;
            font-size: 22px;
            padding: 12px;
            background: #050a05;
            border: 3px solid #2a4a2a;
            color: var(--glow);
            width: 100%;
            max-width: 400px;
            text-align: center;
            letter-spacing: 2px;
            margin: 10px 0;
            image-rendering: pixelated;
            outline: none;
            transition: all 0.1s step-end;
        }

        .pixel-input:focus {
            border-color: var(--glow);
            box-shadow: 0 0 20px rgba(0,255,102,0.3);
        }

        .info-line {
            font-family: 'VT323', monospace;
            font-size: 18px;
            color: #669966;
            margin-top: 20px;
            line-height: 1.8;
        }

        .info-line span {
            color: var(--accent2);
        }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 20px;
            background: var(--glow);
            animation: blink 1s step-end infinite;
            vertical-align: middle;
            margin-left: 4px;
        }

        .hidden { display: none; }

        .error-msg {
            color: var(--danger);
            font-family: 'VT323', monospace;
            font-size: 20px;
            margin-top: 15px;
            text-shadow: 0 0 10px rgba(255,68,68,0.5);
            display: none;
        }

        .error-msg.show { display: block; }

        .admin-link {
            display: inline-block;
            margin-top: 20px;
            font-family: 'VT323', monospace;
            font-size: 20px;
            color: var(--accent2);
            border: 2px dashed var(--accent2);
            padding: 8px 20px;
            text-decoration: none;
            transition: all 0.1s step-end;
        }

        .admin-link:hover {
            border-style: solid;
            background: rgba(0,255,102,0.1);
            text-shadow: 0 0 10px var(--glow);
        }
    </style>
</head>
<body>

<div class="console-container">
    <div class="console-header">
        <div class="console-title">> WPLACE_ADMIN</div>
        <div class="console-subtitle">Pixel Console v1.0</div>
    </div>

    <div class="login-box" id="login-box">
        <h3>[ SYSTEM LOGIN ]</h3>
        <input type="password" id="pass-input" class="pixel-input" placeholder="ВВЕДИТЕ ПАРОЛЬ" maxlength="20" autofocus>
        <br>
        <button class="pixel-btn" onclick="checkPass()">▶ ВОЙТИ</button>
        <p class="error-msg" id="error-msg">⚠ НЕВЕРНЫЙ ПАРОЛЬ. ДОСТУП ЗАПРЕЩЁН.</p>
    </div>

    <div id="success-box" class="hidden">
        <p class="info-line">
            > АУТЕНТИФИКАЦИЯ УСПЕШНА<br>
            > ДОБРО ПОЖАЛОВАТЬ, <span>ADMIN</span><span class="cursor"></span>
        </p>
        <br>
        <a href="/admin/#/" class="pixel-btn" id="admin-link">▶ ОТКРЫТЬ CMS</a>
        <br>
        <a href="/" class="admin-link">← ВЕРНУТЬСЯ НА САЙТ</a>
    </div>

    <p class="info-line" style="margin-top: 25px;">
        > WPLACE_CONSOLE_READY<br>
        > ВЕРСИЯ: 1.0.0_pixel
    </p>
</div>

<script>
    // ⚠️ ПОМЕНЯЙ ПАРОЛЬ ЗДЕСЬ:
    const ADMIN_PASSWORD = "wplace2025";

    // Проверка, авторизован ли уже
    if (sessionStorage.getItem("wplace_admin_auth") === "true") {
        document.getElementById("login-box").classList.add("hidden");
        document.getElementById("success-box").classList.remove("hidden");
    }

    function checkPass() {
        const input = document.getElementById("pass-input");
        const error = document.getElementById("error-msg");
        const loginBox = document.getElementById("login-box");
        const successBox = document.getElementById("success-box");

        if (input.value === ADMIN_PASSWORD) {
            sessionStorage.setItem("wplace_admin_auth", "true");
            loginBox.classList.add("hidden");
            successBox.classList.remove("hidden");
            error.classList.remove("show");
            // Перенаправление через 0.5 секунды
            setTimeout(() => {
                window.location.href = "/admin/#/";
            }, 500);
        } else {
            error.classList.add("show");
            input.value = "";
            input.focus();
            // Эффект дрожания
            input.style.borderColor = "#ff4444";
            setTimeout(() => { input.style.borderColor = "#2a4a2a"; }, 300);
        }
    }

    // Вход по Enter
    document.getElementById("pass-input").addEventListener("keydown", function(e) {
        if (e.key === "Enter") checkPass();
    });
</script>

</body>
</html>
