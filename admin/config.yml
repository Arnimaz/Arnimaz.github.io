backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "home"
    label: "Главная"
    editor:
      preview: false
    files:
      - name: "home"
        label: "Главная страница"
        file: "content/home.json"
        format: "json"
        fields:
          - { name: "title", label: "Заголовок", widget: "string" }
          - { name: "description", label: "Описание", widget: "text" }
